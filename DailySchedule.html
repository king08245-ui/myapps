<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Schedule v8.0</title>
    <style>
        :root {
            --today-clr:#E74C3C; --tomorrow-clr:#3498DB; --bg:#F4F7F6; --overdue-bg:#FFF3E0; --overdue-text:#E74C3C;
            --group-clr:#9B59B6; --help-clr: #2C3E50; --complete-clr: #2ECC71;
            --c1:#FF3B30; --c2:#FFCC00; --c3:#4CD964; --c4:#5AC8FA; --c5:#007AFF; --c6:#5856D6;
        }
        body, html { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:var(--bg); font-family:-apple-system, sans-serif; }
        .app-container { display:flex; flex-direction:column; height:100vh; }

        .app-header { background:white; padding:8px 10px; border-bottom:1px solid #ddd; flex-shrink:0; }
        .app-title { font-size:16px; font-weight:900; color:var(--today-clr); margin:0 0 8px; text-align:center; }
        .header-btns { display:flex; gap:3px; width:100%; }
        .btn-util { flex:1; height:38px; font-size:10px; border-radius:6px; border:1px solid #ddd; background:#f9f9f9; font-weight:bold; display:flex; align-items:center; justify-content:center; }

        .tab-menu { display:flex; background:#fff; border-bottom:1px solid #eee; flex-shrink:0; }
        .tab-btn { flex:1; padding:12px 5px; border:none; background:none; font-weight:bold; color:#999; font-size:13px; cursor:pointer; }
        .tab-btn.active { color:var(--today-clr); border-bottom:3px solid var(--today-clr); }
        .tab-btn[data-tab="tomorrow"].active { color:var(--tomorrow-clr); border-bottom:3px solid var(--tomorrow-clr); }
        .tab-btn[data-tab="favorites"].active { color:var(--group-clr); border-bottom:3px solid var(--group-clr); }

        .scroll-area { flex:1; overflow-y:auto; padding:8px 10px 100px; -webkit-overflow-scrolling:touch; }
        .tab-content { flex:1; display:none; flex-direction:column; overflow:hidden; }
        .tab-content.active { display:flex; }

        .list-item-container { position: relative; overflow: hidden; margin-bottom: 4px; border-radius: 6px; background: #eee; }
        .swipe-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; font-weight: 900; font-size: 14px; color: white; z-index: 1; opacity: 0; }
        .swipe-left-bg { background: var(--today-clr); justify-content: flex-end; }
        .swipe-right-bg { background: var(--complete-clr); justify-content: flex-start; }

        .list-item {
            position: relative; background:white; padding:0 8px; border:1px solid #eee; display:flex; align-items:center; height:50px;
            box-sizing: border-box; z-index: 2; transition: transform 0.1s ease-out; touch-action: pan-y;
        }
        .item-text { flex:1; font-weight:bold; font-size:13.5px; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; }
        .badge-count { background: #eee; color: #666; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; font-weight: 800; }
        .badge-count.remain { background: var(--tomorrow-clr); color: white; }
        .overdue-day { color: var(--overdue-text); font-size: 11px; font-weight: 900; margin-left: 4px; }

        .btn-action { font-size:10px; padding:5px 7px; border-radius:4px; border:1px solid #ddd; background:#fff; font-weight:bold; flex-shrink:0; margin-left:2px; }
        .fav-star { font-size: 16px; color: #FFCC00; border:none; background:none; padding:0 5px; }

        .tz-select { width: 72px; height: 28px; border-radius: 4px; border: 1px solid #ddd; margin-right: 8px; font-size: 10px; font-weight: 800; background:#fff; appearance: none; text-align: center; flex-shrink: 0; }
        .tz-select.s1 { border-left: 5px solid var(--c1); color: var(--c1); }
        .tz-select.s2 { border-left: 5px solid var(--c2); color: #b79500; }
        .tz-select.s3 { border-left: 5px solid var(--c3); color: #2d853d; }
        .tz-select.s4 { border-left: 5px solid var(--c4); color: #0076a8; }
        .tz-select.s5 { border-left: 5px solid var(--c5); color: var(--c5); }
        .tz-select.s6 { border-left: 5px solid var(--c6); color: var(--c6); }

        /* 자동반복 원형 버튼 */
        .repeat-btn {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc;
            cursor: pointer; flex-shrink: 0; margin-left: 4px; transition: background 0.15s;
        }
        .repeat-btn.on  { background: #FFCC00; border-color: #b79500; }
        .repeat-btn.off { background: #E74C3C; border-color: #c0392b; }

        #groupModal, #helpModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; justify-content:center; align-items:center; }
        .modal-content { background:white; width:85%; max-width:320px; border-radius:15px; padding:20px; max-height: 80vh; overflow-y: auto; }
        .modal-item { padding:12px; border-bottom:1px solid #eee; font-size:14px; font-weight:bold; cursor:pointer; display:flex; align-items:center; }

        #detailView { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9998; padding:15px; box-sizing:border-box; }
        .group-body { display:none; background: #f9f9f9; padding: 5px; border-radius: 0 0 6px 6px; margin-top: -4px; margin-bottom: 8px; border: 1px solid #eee; }
        .input-form { padding:10px; background:#fff; border-bottom:1px solid #eee; display:flex; gap:6px; flex-shrink:0; }
        .input-form input { flex:1; border:1px solid #ddd; border-radius:5px; padding:8px; font-size:14px; outline:none; }
        #helpBtn { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--help-clr); color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 999; font-weight: bold; font-size: 11px; }

        .date-display { padding: 8px 10px 0; font-size: 13px; font-weight: 800; color: #666; }

        /* 진도표 탭 */
        .tab-btn[data-tab="progress"].active { color:#27AE60; border-bottom:3px solid #27AE60; }
        .tab-btn[data-tab="memo"].active { color:#2C3E50; border-bottom:3px solid #2C3E50; }
        .memo-item { background:white; border:1px solid #eee; border-left:4px solid #2C3E50; border-radius:6px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:flex-start; gap:8px; }
        .memo-date { font-size:10px; color:#999; font-weight:800; margin-bottom:3px; }
        .memo-text { font-size:13.5px; font-weight:bold; color:#333; line-height:1.5; }
        .prog-card { background:white; border-radius:10px; padding:12px; margin-bottom:10px; border:1px solid #eee; }
        .prog-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .prog-title { font-size:14px; font-weight:900; color:#333; }
        .prog-badge { font-size:10px; background:#eee; padding:2px 8px; border-radius:10px; color:#555; font-weight:800; }
        .prog-bar-bg { background:#f0f0f0; height:8px; border-radius:4px; overflow:hidden; margin:6px 0; }
        .prog-bar-fill { height:100%; border-radius:4px; transition:width 0.3s; }
        .prog-sub { font-size:11px; color:#888; margin-bottom:8px; line-height:1.6; }
        .prog-btns { display:flex; gap:5px; flex-wrap:wrap; }
        .prog-btn { height:30px; padding:0 10px; border-radius:5px; border:1px solid #ddd; background:#f9f9f9; font-size:11px; font-weight:bold; cursor:pointer; }
        .prog-btn.red { background:var(--today-clr); color:white; border:none; }
        .prog-btn.green { background:var(--complete-clr); color:white; border:none; }
        .prog-btn.blue { background:var(--tomorrow-clr); color:white; border:none; }
        .prog-today-tag { display:inline-block; background:#E74C3C; color:white; font-size:9px; font-weight:900; padding:1px 5px; border-radius:6px; margin-left:4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1 class="app-title">Daily Schedule v7.9</h1>
        <div class="header-btns">
            <button class="btn-util" onclick="notionSync()" style="background:#000;color:#fff;border-color:#000;">🔄 노션동기화</button>
            <button class="btn-util" onclick="exportData()">백업</button>
            <button class="btn-util" onclick="document.getElementById('importFile').click()">복구</button>
            <button class="btn-util" onclick="downloadCSV()">CSV</button>
            <button class="btn-util" onclick="resetAllData()">초기화</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </header>

    <nav class="tab-menu">
        <button class="tab-btn active" data-tab="today" onclick="openTab('today', this)">오늘</button>
        <button class="tab-btn" data-tab="tomorrow" onclick="openTab('tomorrow', this)">내일</button>
        <button class="tab-btn" data-tab="favorites" onclick="openTab('favorites', this)">즐겨찾기</button>
        <button class="tab-btn" data-tab="progress" onclick="openTab('progress', this)">진도표</button>
        <button class="tab-btn" data-tab="memo" onclick="openTab('memo', this)">메모</button>
    </nav>

    <div class="input-form" id="mainInputForm">
        <input type="text" id="in-today" placeholder="오늘 할 일 입력 (Enter/이동 시 생성)" onkeypress="if(event.key==='Enter') addProject('today')">
        <button class="btn-action" onclick="addProject('today')" style="background:var(--today-clr); color:white; border:none; width:50px;">생성</button>
    </div>

    <section id="tab-today" class="tab-content active">
        <div id="today-date-info" class="date-display"></div>
        <div id="list-today" class="scroll-area"></div>
    </section>
    <section id="tab-tomorrow" class="tab-content">
        <div id="list-tomorrow" class="scroll-area"></div>
    </section>
    <section id="tab-favorites" class="tab-content">
        <div class="input-form">
            <input type="text" id="in-group" placeholder="새 그룹 이름" onkeypress="if(event.key==='Enter') createGroup()">
            <button class="btn-action" onclick="createGroup()" style="background:var(--group-clr); color:white; border:none; height:34px;">방 생성</button>
        </div>
        <div id="list-favorites" class="scroll-area"></div>
    </section>
    <section id="tab-progress" class="tab-content">
        <div id="list-progress" class="scroll-area"></div>
    </section>
    <section id="tab-memo" class="tab-content" style="flex-direction:column;">
        <div class="input-form" style="display:flex;">
            <input type="text" id="in-memo" placeholder="메모 입력..." onkeypress="if(event.key==='Enter') addMemo()" style="flex:1;border:1px solid #ddd;border-radius:5px;padding:8px;font-size:14px;outline:none;">
            <button class="btn-action" onclick="addMemo()" style="background:#2C3E50;color:white;border:none;width:50px;margin-left:6px;">추가</button>
        </div>
        <div id="list-memo" class="scroll-area"></div>
    </section>
</div>

<div id="detailView">
    <div style="display:flex; align-items:center; margin-bottom:15px; gap:10px;">
        <button onclick="history.back()" class="btn-action">← 닫기</button>
        <h2 id="currentProjectTitle" style="margin:0; font-size:16px; flex:1"></h2>
    </div>
    <div class="input-form">
        <input type="text" id="newItemName" placeholder="할 일 추가..." onkeypress="if(event.key==='Enter') addItem()">
        <button class="btn-action" onclick="addItem()">추가</button>
    </div>
    <div id="itemList" class="scroll-area"></div>
</div>

<div id="groupModal">
    <div class="modal-content">
        <h3 style="margin-top:0">이동</h3>
        <div id="modalGroupList"></div>
        <button onclick="closeModal()" style="width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#eee;">취소</button>
    </div>
</div>

<div id="helpModal">
    <div class="modal-content">
        <h3>사용법</h3>
        <p>• 스와이프 오른쪽: 완료 처리<br>• 스와이프 왼쪽: 삭제 처리<br>• 내일 버튼: 클릭 시 제목 뒤에 +1 누적</p>
        <button onclick="toggleHelp(false)" style="width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#eee;">닫기</button>
    </div>
</div>

<button id="helpBtn" onclick="toggleHelp(true)">도움말</button>

<script>
    let storage = JSON.parse(localStorage.getItem('dailySchedule_v4')) || { data: [], favorites: [], groups: [], history: [] };
    const getRawDate = () => new Date().toLocaleDateString('sv-SE');
    const getTomDate = () => { let d=new Date(); d.setDate(d.getDate()+1); return d.toLocaleDateString('sv-SE'); };

    function getTodayFullText() {
        const d = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${week[d.getDay()]})`;
    }

    let currentProjectId = null;
    let currentGroupInfo = null;
    let movingItem = null;   // { type:'fav', idx } 또는 { type:'groupProject', gId, pIdx }
    const timeLabels = { 0:"시간미정", 1:"06-09시", 2:"09-12시", 3:"12-15시", 4:"15-18시", 5:"18-21시", 6:"21-24시" };

    function save(noRender) {
        localStorage.setItem('dailySchedule_v4', JSON.stringify(storage));
        if(!noRender) renderAll();
    }

    let touchStartX = 0;
    function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
    function handleTouchMove(e) {
        let diff = e.touches[0].clientX - touchStartX;
        const el = e.currentTarget;
        const container = el.parentElement;
        if (Math.abs(diff) > 20) {
            el.style.transform = `translateX(${diff}px)`;
            const rb = container.querySelector('.swipe-right-bg');
            const lb = container.querySelector('.swipe-left-bg');
            if(diff > 0) { rb.style.opacity = 1; lb.style.opacity = 0; rb.innerText = diff > 100 ? "완료!!!" : "완료"; }
            else { lb.style.opacity = 1; rb.style.opacity = 0; lb.innerText = diff < -100 ? "삭제!!!" : "삭제"; }
        }
    }
    function handleTouchEnd(e, id) {
        const el = e.currentTarget;
        const diff = e.changedTouches[0].clientX - touchStartX;
        if (diff > 120) finishProject(id, '완료');
        else if (diff < -120) finishProject(id, '삭제');
        else { el.style.transform = `translateX(0)`; el.parentElement.querySelectorAll('.swipe-bg').forEach(b => b.style.opacity = 0); }
    }

    function finishProject(id, action) {
        const idx = storage.data.findIndex(p => p.id === id);
        if(idx > -1) { storage.history.push({ date: getRawDate(), title: `[${action}] ${storage.data[idx].title}` }); storage.data.splice(idx, 1); save(); }
    }

    function renderAll() {
        const today = getRawDate(), tom = getTomDate();
        const sortFn = (a, b) => (a.timeZone || 99) - (b.timeZone || 99);
        document.getElementById('today-date-info').innerText = "📅 " + getTodayFullText();
        renderList('list-today', storage.data.filter(p => p.date <= today).sort(sortFn), today);
        renderList('list-tomorrow', storage.data.filter(p => p.date === tom).sort(sortFn), today);
        renderFavSection();
    }

    function renderList(domId, data, todayStr) {
        const el = document.getElementById(domId);
        el.innerHTML = data.map(p => {
            const diff = Math.floor((new Date(todayStr) - new Date(p.date)) / 86400000);
            const remain = (p.items || []).filter(i => !i.checked).length;
            const isFav = storage.favorites.some(f => f.title === p.title);
            return `
            <div class="list-item-container">
                <div class="swipe-bg swipe-right-bg">완료</div><div class="swipe-bg swipe-left-bg">삭제</div>
                <div class="list-item" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event, ${p.id})">
                    <select class="tz-select s${p.timeZone||0}" onchange="changeTimeZone(${p.id}, this.value)">
                        ${Object.entries(timeLabels).map(([v, l]) => `<option value="${v}" ${p.timeZone==v?'selected':''}>${l}</option>`).join('')}
                    </select>
                    <span class="item-text" onclick="openDetail(${p.id})">${p.title} ${diff>0?`<span class="overdue-day">+${diff}</span>`:''} ${(p.items||[]).length>0?`<span class="badge-count ${remain>0?'remain':''}">${remain==0?'✓':remain}</span>`:''}</span>
                    <button class="fav-star" onclick="toggleFavorite(${p.id})">${isFav?'★':'☆'}</button>
                    <button class="btn-action" onclick="editTitle('project', ${p.id})">수정</button>
                    <button class="btn-action" onclick="moveToTomorrow(${p.id})">내일</button>
                </div>
            </div>`;
        }).join('');
    }

    // ── [수정1] 즐겨찾기 탭 렌더 — 그룹 오름차순 정렬
    function renderFavSection() {
        const list = document.getElementById('list-favorites');
        let h = `<h4 style="margin:10px 0; font-size:11px; color:#888;">👥 그룹(방)</h4>`;

        // 그룹 오름차순 정렬
        const sortedGroups = [...storage.groups].sort((a, b) => a.title.localeCompare(b.title, 'ko'));

        sortedGroups.forEach(g => {
            h += `<div class="group-container">
                    <div class="list-item" style="border-left:4px solid var(--group-clr)">
                        <span class="item-text" onclick="toggleGroupBody(${g.id})">📦 ${g.title} (${g.projects.length})</span>
                        <button class="btn-action" onclick="editTitle('group', ${g.id})">수정</button>
                        <button class="btn-action" onclick="runGroup(${g.id})">복사</button>
                        <button class="btn-action" onclick="deleteGroup(${g.id})" style="color:red">삭제</button>
                    </div>
                    <div id="group-body-${g.id}" class="group-body">
                        ${g.projects.map((p, i) => `
                            <div style="display:flex; align-items:center; margin-bottom:4px; padding:5px; background:white; border-radius:4px; border:1px solid #eee;">
                                <span style="flex:1; font-size:12px; font-weight:bold; cursor:pointer;" onclick="openDetail(null, ${g.id}, ${i})">• ${p.title} (${(p.items||[]).length})</span>
                                <button class="btn-action" style="font-size:9px" onclick="editTitle('groupProject', ${g.id}, ${i})">수정</button>
                                <button class="btn-action" style="font-size:9px" onclick="openGroupProjectMoveModal(${g.id}, ${i})">이동</button>
                                <button class="btn-action" style="font-size:9px; color:red;" onclick="deleteGroupProject(${g.id}, ${i})">삭제</button>
                                <button class="repeat-btn ${p.autoRepeat?'on':'off'}" onclick="toggleAutoRepeat(${g.id}, ${i})" title="${p.autoRepeat?'매일자동(켜짐)':'매일자동(꺼짐)'}"></button>
                            </div>`).join('')}
                    </div>
                  </div>`;
        });

        // ── [수정2] 즐겨찾기 목록 — 시간 선택기 추가
        h += `<h4 style="margin:20px 0 10px; font-size:11px; color:#888;">⭐ 즐겨찾기 목록</h4>`;
        storage.favorites.forEach((f, idx) => {
            const tz = f.timeZone || 0;
            h += `<div class="list-item" style="height:auto; padding:6px 8px; margin-bottom:4px; border:1px solid #eee; border-radius:6px;">
                <div style="display:flex; align-items:center; width:100%; gap:4px;">
                    <select class="tz-select s${tz}" onchange="changeFavTimeZone(${idx}, this.value)">
                        ${Object.entries(timeLabels).map(([v,l]) => `<option value="${v}" ${tz==v?'selected':''}>${l}</option>`).join('')}
                    </select>
                    <span class="item-text">${f.title}</span>
                    <button class="btn-action" onclick="copyToToday(${idx})">오늘</button>
                    <button class="btn-action" onclick="openMoveModal(${idx})">이동</button>
                    <button class="btn-action" onclick="toggleFavorite(null, '${f.title}')">삭제</button>
                </div>
            </div>`;
        });
        list.innerHTML = h;
    }

    function deleteGroup(id) { if(confirm("그룹을 삭제하시겠습니까?")) { storage.groups = storage.groups.filter(g => g.id !== id); save(); } }
    function deleteGroupProject(gId, pIdx) { if(confirm("프로젝트를 삭제하시겠습니까?")) { const g = storage.groups.find(x => x.id === gId); g.projects.splice(pIdx, 1); save(); } }

    // ── [수정3] 자동반복 토글
    function toggleAutoRepeat(gId, pIdx) {
        const g = storage.groups.find(x => x.id === gId);
        g.projects[pIdx].autoRepeat = !g.projects[pIdx].autoRepeat;
        save();
    }

    // ── [수정3] 앱 시작 시 자동반복 항목을 오늘탭에 복사
    function checkAutoRepeat() {
        const today = getRawDate();
        if (storage.lastAutoRepeatDate === today) return;
        storage.lastAutoRepeatDate = today;
        let added = 0;
        storage.groups.forEach(g => {
            g.projects.forEach(p => {
                if (p.autoRepeat) {
                    const exists = storage.data.some(x => x.title === p.title && x.date === today);
                    if (!exists) {
                        let n = JSON.parse(JSON.stringify(p));
                        n.id = Date.now() + (added++);
                        n.date = today;
                        n.timeZone = p.timeZone || 0;
                        storage.data.push(n);
                    }
                }
            });
        });
        localStorage.setItem('dailySchedule_v4', JSON.stringify(storage));
    }

    // ── [수정4] 이동 모달 — 즐겨찾기↔그룹 상호 이동
    function openMoveModal(idx) {
        movingItem = { type: 'fav', idx };
        showMoveModal();
    }
    function openGroupProjectMoveModal(gId, pIdx) {
        movingItem = { type: 'groupProject', gId, pIdx };
        showMoveModal();
    }

    async function notionSync() {
      try {
        const today = getRawDate();
        const now = new Date().toISOString().slice(0,16).replace('T',' ');

        // 할일 읽기
        const taskData = await notionApiQuery({
          filter: { and: [
            { property: '완료 여부', checkbox: { equals: false } },
            { property: '분류', select: { equals: '오늘' } }
          ]},
          sorts: [{ timestamp: 'created_time', direction: 'ascending' }]
        });
        if (!taskData) return;

        // 일정 읽기
        const schedData = await notionApiQuery({
          filter: { and: [
            { property: '완료 여부', checkbox: { equals: false } },
            { property: '분류', select: { equals: '일정' } }
          ]},
          sorts: [{ property: '날짜', direction: 'ascending' }]
        });

        // 기존 노션 항목 제거
        storage.data = storage.data.filter(x => !x.fromNotion);

        let addedCount = 0;
        const tasks = taskData.results || [];
        tasks.forEach(page => {
          storage.data.push({
            id: Date.now() + Math.random(),
            title: getNotionTitle(page),
            date: today, items: [], timeZone: 0,
            fromNotion: true, notionType: 'task'
          });
          addedCount++;
        });

        const scheds = (schedData?.results) || [];
        scheds.forEach(page => {
          const dateStr = getNotionDate(page, '날짜');
          const label = dateStr ? ` (${dateStr})` : '';
          storage.data.push({
            id: Date.now() + Math.random(),
            title: '📅 ' + getNotionTitle(page) + label,
            date: today, items: [], timeZone: 0,
            fromNotion: true, notionType: 'schedule'
          });
          addedCount++;
        });

        save();
        alert(`✅ 노션 동기화 완료!\n할일 ${tasks.length}개 + 일정 ${scheds.length}개\n${now}`);
      } catch(e) {
        if (e.message.includes('401') || e.message.includes('unauthorized')) {
          localStorage.removeItem(NOTION_KEY_STORAGE);
          alert('API 키가 올바르지 않아요. 다시 입력해주세요.');
          notionSync();
        } else {
          alert('❌ 동기화 실패\n' + e.message);
        }
      }
    }

            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${runPct}%;background:#27AE60;"></div></div>
            <div class="prog-sub">${weekNum}주차 목표: ${runGoal}km/일 · 최종 목표: 10km<br>오늘 기록: ${todayRun}km</div>
            <div class="prog-btns">
                <button class="prog-btn red" onclick="addRunning(1)">+1km</button>
                <button class="prog-btn blue" onclick="addRunning(2)">+2km</button>
                <button class="prog-btn" onclick="addRunning(5)">+5km</button>
                <button class="prog-btn" onclick="resetRunning()" style="color:red">초기화</button>
            </div>
        </div>

        <div class="prog-card">
            <div class="prog-header">
                <span class="prog-title">🏋️ 불가리안 백 (월·수·금)${bulgarianDay ? '<span class="prog-today-tag">오늘!</span>' : ''}</span>
                <span class="prog-badge">이번주 ${bulgThisWeek}/3회</span>
            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.round(bulgThisWeek/3*100)}%;background:#9B59B6;"></div></div>
            <div class="prog-sub">오후 5시 YouTube 알림 · 오늘은 ${bulgarianDay ? '🔥 운동 날' : '휴식'}</div>
            <div class="prog-btns">
                <button class="prog-btn ${bulgToday ? 'green' : 'red'}" onclick="markBulgarian()">${bulgToday ? '✓ 오늘 완료' : '오늘 완료'}</button>
            </div>
        </div>

        <div class="prog-card">
            <div class="prog-header">
                <span class="prog-title">🏋️ 아령운동 (화·목·토)${dumbbellDay ? '<span class="prog-today-tag">오늘!</span>' : ''}</span>
                <span class="prog-badge">이번주 ${dumbThisWeek}/3회</span>
            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.round(dumbThisWeek/3*100)}%;background:#3498DB;"></div></div>
            <div class="prog-sub">오후 5시 YouTube 알림 · 오늘은 ${dumbbellDay ? '🔥 운동 날' : '휴식'}</div>
            <div class="prog-btns">
                <button class="prog-btn ${dumbToday ? 'green' : 'red'}" onclick="markDumbbell()">${dumbToday ? '✓ 오늘 완료' : '오늘 완료'}</button>
            </div>
        </div>

        <div class="prog-card">
            <div class="prog-header">
                <span class="prog-title">📚 독서</span>
                <span class="prog-badge">${readingPct}% 완료</span>
            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${readingPct}%;background:#F39C12;"></div></div>
            <div class="prog-sub">현재 책: ${p.reading.book}</div>
            <div class="prog-btns">
                <button class="prog-btn red" onclick="addReadingPct(10)">+10%</button>
                <button class="prog-btn blue" onclick="addReadingPct(25)">+25%</button>
                <button class="prog-btn green" onclick="completeReading()">✓ 완독</button>
                <button class="prog-btn" onclick="changeBook()">책 변경</button>
            </div>
        </div>

        <div class="prog-card">
            <div class="prog-header">
                <span class="prog-title">👩 어머니 인터넷 수업</span>
                <span class="prog-badge">${p.motherLesson.count}/40강 · ${motherPct}%</span>
            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${motherPct}%;background:#1ABC9C;"></div></div>
            <div class="prog-sub">토요일 저녁 · 주 1강 · 다음 수업: ${nextSat}</div>
            <div class="prog-btns">
                <button class="prog-btn green" onclick="addMotherLesson()">+1강 완료</button>
            </div>
        </div>`;
    }

    function markGuitarDone()  { const p=getProgress(),t=getRawDate(); if(!p.guitar.practiced.includes(t)) p.guitar.practiced.push(t); saveProgress(p); renderProgress(); }
    function addPushups(n)     { const p=getProgress(); p.pushups.today+=n; saveProgress(p); renderProgress(); }
    function resetPushups()    { const p=getProgress(); p.pushups.today=0; saveProgress(p); renderProgress(); }
    function addRunning(km)    { const p=getProgress(),t=getRawDate(); let r=p.running.history.find(x=>x.date===t); if(!r){r={date:t,km:0};p.running.history.push(r);} r.km+=km; saveProgress(p); renderProgress(); }
    function resetRunning()    { const p=getProgress(),t=getRawDate(); const i=p.running.history.findIndex(x=>x.date===t); if(i>-1)p.running.history.splice(i,1); saveProgress(p); renderProgress(); }
    function markBulgarian()   { const p=getProgress(),t=getRawDate(); if(!p.bulgarian.history.includes(t))p.bulgarian.history.push(t); saveProgress(p); renderProgress(); }
    function markDumbbell()    { const p=getProgress(),t=getRawDate(); if(!p.dumbbell.history.includes(t))p.dumbbell.history.push(t); saveProgress(p); renderProgress(); }
    function addReadingPct(n)  { const p=getProgress(); p.reading.pct=Math.min((p.reading.pct||0)+n,100); saveProgress(p); renderProgress(); }
    function completeReading() { const p=getProgress(); p.reading.pct=100; alert(`"${p.reading.book}" 완독!`); saveProgress(p); renderProgress(); }
    function changeBook()      { const p=getProgress(); const n=prompt('새 책 제목:',''); if(n){p.reading.book=n;p.reading.pct=0;saveProgress(p);renderProgress();} }
    function addMotherLesson() { const p=getProgress(); if(p.motherLesson.count<40)p.motherLesson.count++; saveProgress(p); renderProgress(); }

    // ── 메모 시스템 ──────────────────────────────────────────────────
    let memos = JSON.parse(localStorage.getItem('memos_v1')) || [
        { id: 1, date: '2026-05-09', text: '차량 수리 내역 확인 후 앤트로픽 문의' },
        { id: 2, date: '2026-05-09', text: '용산구청 에어비앤비 보완' },
        { id: 3, date: '2026-05-09', text: '네이버플레이스/당근/네이버블로그 정리/명함 정리' },
        { id: 4, date: '2026-05-09', text: '사진 정리' },
    ];
    if (!localStorage.getItem('memos_v1')) localStorage.setItem('memos_v1', JSON.stringify(memos));

    function saveMemos() { localStorage.setItem('memos_v1', JSON.stringify(memos)); renderMemos(); }

    function addMemo() {
        const i = document.getElementById('in-memo');
        if (!i.value.trim()) return;
        memos.unshift({ id: Date.now(), date: getRawDate(), text: i.value.trim() });
        i.value = '';
        saveMemos();
    }

    function deleteMemo(id) { memos = memos.filter(m => m.id !== id); saveMemos(); }

    function renderMemos() {
        const el = document.getElementById('list-memo');
        if (!el) return;
        el.innerHTML = memos.length === 0
            ? '<p style="text-align:center;color:#999;padding:20px;">메모가 없습니다</p>'
            : memos.map(m => `
            <div class="memo-item">
                <div style="flex:1;">
                    <div class="memo-date">${m.date}</div>
                    <div class="memo-text">${m.text}</div>
                </div>
                <button class="btn-action" onclick="deleteMemo(${m.id})" style="color:red;flex-shrink:0;">X</button>
            </div>`).join('');
    }
    // ─────────────────────────────────────────────────────────────────
</script>
</body>
</html>
