<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MindMap Pro - v2.3.2</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.10/css/litegraph.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.10/build/litegraph.min.js"></script>
    <style>
        :root { --sidebar-width: 280px; --accent-color: #2e5d8a; --success-color: #27ae60; --save-color: #f39c12; }
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; display: flex; background: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }

        /* ── [수정4] 사이드바 — 항상 캔버스 위에 떠있는 오버레이 방식 ── */
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: #f1f3f5;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 20px rgba(0,0,0,0.2);
        }
        #sidebar.hidden {
            transform: translateX(-100%);
            box-shadow: none;
        }
        /* 캔버스 컨테이너는 항상 전체화면 — 사이드바가 그 위에 뜸 */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        /* 사이드바 토글 탭 버튼 */
        #sidebar-toggle {
            position: fixed;
            top: 50%;
            left: var(--sidebar-width);
            transform: translateY(-50%);
            width: 22px;
            height: 60px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            transition: left 0.3s ease;
            box-shadow: 3px 0 10px rgba(0,0,0,0.2);
            writing-mode: vertical-rl;
            letter-spacing: 2px;
        }
        #sidebar-toggle.sidebar-hidden {
            left: 0;
        }

        #sidebar-header { padding: 20px; border-bottom: 1px solid #ddd; background: #fff; }
        .header-btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn-main { background: var(--accent-color); color: white; flex: 1; padding: 10px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-save-manual { background: var(--save-color); color: white; flex: 1; padding: 10px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        #project-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .project-item { position: relative; padding: 6px 10px; background: #fff; border: 1px solid #ced4da; border-radius: 8px; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; }
        .project-item.active { border: 2px solid var(--accent-color); background: #f8f9fa; }
        .project-main-info { flex: 1; overflow: hidden; }
        .project-name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-time { font-size: 10px; color: #888; }
        .project-actions { display: flex; flex-direction: column; gap: 2px; align-items: center; }
        .order-btns { display: flex; gap: 2px; }
        .action-btn { background: #eee; border: none; padding: 2px 4px; cursor: pointer; font-size: 10px; border-radius: 4px; }
        .action-btn:hover { background: #ddd; }
        .btn-footer { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; flex: 1; }
        #sidebar-footer { padding: 15px; background: #fff; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        #canvas-container { flex: 1; position: relative; background: #eee; overflow: hidden; }
        canvas { display: block; background: #ffffff; outline: none; }
        .zoom-controls { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .zoom-btn { width: 110px; height: 110px; border-radius: 50%; background: var(--accent-color); color: white; border: none; font-size: 60px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .node-editor { position: fixed; background: transparent !important; color: transparent !important; caret-color: #4A90E2; border: none !important; outline: none !important; z-index: 10001; resize: none; overflow: hidden; white-space: pre; line-height: 30px; }
        #save-toast { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; }

        /* 스와이프 힌트 오버레이 (모바일) */
        #swipe-hint {
            display: none;
            position: fixed;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            background: rgba(46,93,138,0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 300;
            pointer-events: none;
            animation: fadeout 2.5s forwards;
        }
        @keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
        @media (max-width: 768px) {
            #swipe-hint { display: block; }
            .zoom-btn { width: 70px; height: 70px; font-size: 36px; }
        }
    </style>
</head>
<body>
    <!-- [수정4] 사이드바 토글 탭 -->
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="메뉴 열기/닫기">☰</button>

    <div id="sidebar">
        <div id="sidebar-header">
            <h2 style="margin: 0; font-size: 20px; color: var(--accent-color); margin-bottom:5px;">Mind Map Pro</h2>
            <div class="header-btns">
                <button class="btn-main" onclick="createNewProject()">+ New Project</button>
                <button class="btn-save-manual" onclick="manualSave()">💾 Save (전체)</button>
            </div>
            <div style="margin-top:8px;">
                <button onclick="notionSyncMindmap()" style="width:100%;padding:10px;background:#000;color:#fff;border:none;border-radius:8px;font-weight:bold;font-size:13px;cursor:pointer;">🔄 노션 수집함 동기화</button>
            </div>
        </div>
        <div id="project-list"></div>
        <div id="sidebar-footer">
            <div style="display:flex; gap:5px;">
                <button class="btn-footer" style="background:var(--success-color)" onclick="exportAllProjects()">💾 추출</button>
                <button class="btn-footer" style="background:#6c757d" onclick="document.getElementById('fileInput').click()">📂 불러오기</button>
            </div>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importAndRepair(event)">
        </div>
    </div>

    <div id="canvas-container">
        <canvas id='mycanvas' tabindex="1"></canvas>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
            <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
        </div>
        <div id="save-toast">모든 프로젝트 저장 완료</div>
    </div>

    <!-- 모바일 스와이프 힌트 -->
    <div id="swipe-hint">← 스와이프로 메뉴 열기/닫기</div>

    <script>
        const pathRegex = /(https?:\/\/[^\s\n]+)|([a-zA-Z]:\\[^"<>|]+)|(\\\\[^"<>|]+)/g;
        const MAX_IMG_WIDTH = 800;
        const STORAGE_KEY = "lg_v46_final";
        let currentProjectId = null;
        let undoStack = [];
        let clipboard = null;
        let lastMouseEvt = null;

        // ── [수정4] 사이드바 토글 ──────────────────────────────────────
        let sidebarVisible = true;

        function toggleSidebar(forceOpen) {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            const isMobile = window.innerWidth <= 768;

            if (forceOpen !== undefined) {
                sidebarVisible = forceOpen;
            } else {
                sidebarVisible = !sidebarVisible;
            }

            if (sidebarVisible) {
                sidebar.classList.remove('hidden');
                toggleBtn.classList.remove('sidebar-hidden');
                toggleBtn.innerHTML = '☰';
                toggleBtn.style.left = isMobile ? 'var(--sidebar-width)' : 'var(--sidebar-width)';
            } else {
                sidebar.classList.add('hidden');
                toggleBtn.classList.add('sidebar-hidden');
                toggleBtn.innerHTML = '☰';
                toggleBtn.style.left = '0';
            }

            // 캔버스 리사이즈
            setTimeout(() => resizeCanvas(), 310);
        }

        function resizeCanvas() {
            canvas.resize(window.innerWidth, window.innerHeight);
        }

        // ── [수정4] 모바일 스와이프 제스처 (사이드바 열기/닫기) ───────
        let touchStartX_sidebar = 0;
        let touchStartY_sidebar = 0;
        let isSidebarSwipe = false;

        document.addEventListener('touchstart', (e) => {
            touchStartX_sidebar = e.touches[0].clientX;
            touchStartY_sidebar = e.touches[0].clientY;
            isSidebarSwipe = false;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            const dx = e.touches[0].clientX - touchStartX_sidebar;
            const dy = e.touches[0].clientY - touchStartY_sidebar;
            // 수평 이동이 수직보다 크고, 에디터가 없을 때만 처리
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30 && !document.querySelector('.node-editor')) {
                isSidebarSwipe = true;
            }
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!isSidebarSwipe) return;
            if (document.querySelector('.node-editor')) return;

            const dx = e.changedTouches[0].clientX - touchStartX_sidebar;

            // 오른쪽 스와이프 (→) → 사이드바 열기
            if (dx > 60 && !sidebarVisible) {
                toggleSidebar(true);
            }
            // 왼쪽 스와이프 (←) → 사이드바 닫기
            else if (dx < -60 && sidebarVisible) {
                toggleSidebar(false);
            }

            isSidebarSwipe = false;
        }, { passive: true });
        // ─────────────────────────────────────────────────────────────

        // --- 자동화: 모든 프로젝트 순회 저장 ---
        async function manualSave() {
            const originalId = currentProjectId;
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const sortedKeys = Object.keys(projects).sort((a,b) => (projects[a].order || 0) - (projects[b].order || 0));
            
            if (sortedKeys.length === 0) return;

            showToast("전체 프로젝트 자동 순회 저장 시작...");
            
            if (currentProjectId) saveCurrentProject(false);

            for (const id of sortedKeys) {
                await selectProject(id);
                saveCurrentProject(false);
                await new Promise(r => setTimeout(r, 50)); 
            }

            if (originalId) await selectProject(originalId);
            
            showToast("✅ 모든 프로젝트 순차 저장 완료");
            loadProjectList();
        }

        function saveCurrentProject(showToastFlag = false) {
            if (!currentProjectId) return;
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            if (!projects[currentProjectId]) return;

            projects[currentProjectId].data = graph.serialize();
            projects[currentProjectId].offset = [canvas.ds.offset[0], canvas.ds.offset[1]];
            projects[currentProjectId].scale = canvas.ds.scale;
            projects[currentProjectId].updatedAt = Date.now();
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
            if (showToastFlag) { showToast("저장 완료"); loadProjectList(); }
        }

        async function selectProject(id) {
            if (currentProjectId && currentProjectId !== id) {
                saveCurrentProject(false);
            }
            currentProjectId = id;
            undoStack = [];
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            graph.clear();
            if (projects[id] && projects[id].data) graph.configure(projects[id].data);
            canvas.ds.offset = [...(projects[id].offset || [0, 0])];
            canvas.ds.scale = projects[id].scale || 1;
            // 버전간 슬롯 타입 보정 (와이어 연결 호환)
            repairGraphLinks();
            saveUndoState();
            loadProjectList();
        }

        async function openHyperlink(path) {
            let targetPath = path.trim();
            if (/^[a-zA-Z]:\\|^\\\\/.test(targetPath)) {
                try {
                    await navigator.clipboard.writeText(targetPath);
                    showToast("비서에게 경로 전달: " + targetPath.split('\\').pop());
                } catch(err) {
                    const t = document.createElement("textarea"); t.value = targetPath;
                    document.body.appendChild(t); t.select(); document.execCommand('copy');
                    document.body.removeChild(t);
                }
            } else {
                if (!/^https?:\/\//i.test(targetPath)) targetPath = "https://" + targetPath;
                window.open(targetPath, '_blank');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById("save-toast");
            toast.innerText = msg; toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 2500);
        }

        LiteGraph.NODE_SLOT_HEIGHT = 20; LiteGraph.NODE_WIDGET_HEIGHT = 20;
        LiteGraph.canvas_send_back_on_deselect = false;

        function saveUndoState() {
            const state = JSON.stringify(graph.serialize());
            if (undoStack.length > 0 && undoStack[undoStack.length - 1] === state) return;
            undoStack.push(state); if (undoStack.length > 50) undoStack.shift();
        }

        // ── 버전간 슬롯 타입 보정 (와이어 연결 호환) ────────────────────
        function repairGraphLinks() {
            if (!graph._nodes) return;
            graph._nodes.forEach(node => {
                if (node.inputs)  node.inputs.forEach(s  => { s.type = "number"; });
                if (node.outputs) node.outputs.forEach(s => { s.type = "number"; });
            });
            if (graph.links) {
                Object.values(graph.links).forEach(link => { if (link) link.type = "number"; });
            }
            graph.setDirtyCanvas(true, true);
        }
        // ─────────────────────────────────────────────────────────────────

        function undo() {
            if (undoStack.length <= 1) return;
            undoStack.pop(); graph.configure(JSON.parse(undoStack[undoStack.length - 1]));
            graph.setDirtyCanvas(true, true); saveCurrentProject(false);
        }

        async function resizeImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    let width = img.width, height = img.height;
                    if (width > MAX_IMG_WIDTH) { height *= MAX_IMG_WIDTH / width; width = MAX_IMG_WIDTH; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = dataUrl;
            });
        }

        function ProjectLinkNode() {
            this.properties = { targetId: "", targetName: "Select Project", bgColor: "#f39c12" };
            this.size = [200, 60]; this.addInput("", "number"); this.addOutput("", "number");
        }
        ProjectLinkNode.prototype.onDrawForeground = function(ctx) {
            if (this.flags.collapsed) return;
            ctx.fillStyle = this.properties.bgColor; ctx.beginPath(); ctx.roundRect(0, 0, this.size[0], this.size[1], 12); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
            ctx.fillText("🚀 " + this.properties.targetName, this.size[0]/2, this.size[1]/2 + 5);
        };
        ProjectLinkNode.prototype.onMouseDown = function(e, pos) { if (e.altKey && this.properties.targetId) { selectProject(this.properties.targetId); return true; } };
        ProjectLinkNode.prototype.getMenuOptions = function() {
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            let options = [{ content: "Delete", callback: () => { saveUndoState(); graph.remove(this); }}];
            Object.keys(projects).forEach(id => {
                options.push({ content: `Link: ${projects[id].name}`, callback: () => { 
                    saveUndoState(); this.properties.targetId = id; this.properties.targetName = projects[id].name; saveCurrentProject(true);
                }});
            });
            return options;
        };
        LiteGraph.registerNodeType("map/project_link", ProjectLinkNode);

        // ── 노드 폰트/라인 상수 ─────────────────────────────────────────
        const NODE_FONT_SIZE = 14;      // px
        const NODE_LINE_HEIGHT = 30;    // px (한 줄 높이 30px)
        const NODE_PAD_H = 10;          // 상하 여백 합계 (1줄 기준 총높이 = 40px)
        const NODE_PAD_W = 40;          // 좌우 여백 합계 (텍스트에 딱 맞게)
        const NODE_MIN_W = 80;          // 최소 너비
        // ─────────────────────────────────────────────────────────────────

        function SimpleTextNode() {
            this.properties = { content: "Node", bgColor: "#1e1e1e", imgData: null };
            // 초기 높이: 1줄 = 30px + 여백
            this.size = [200, NODE_LINE_HEIGHT + NODE_PAD_H];
            this._img_obj = null;
            this.addInput("", "number");
            this.addOutput("", "number");
        }

        // ── 슬롯 위치를 노드 높이 중앙에 고정 ──────────────────────────
        // (왼쪽 위 잔여 타이틀 핸들 제거 효과 + 항상 중앙)
        SimpleTextNode.prototype.getConnectionPos = function(is_input, slot_number, out) {
            out = out || [0, 0];
            if (is_input) {
                out[0] = this.pos[0];
                out[1] = this.pos[1] + this.size[1] / 2;
            } else {
                out[0] = this.pos[0] + this.size[0];
                out[1] = this.pos[1] + this.size[1] / 2;
            }
            return out;
        };
        // ─────────────────────────────────────────────────────────────────

        // ── [수정2] 멀티선택 우클릭 메뉴 → 모든 선택 노드에 동시 적용 ──
        SimpleTextNode.prototype.getMenuOptions = function() {
            const colors = [
                {name:"Black",code:"#1e1e1e"},{name:"Blue",code:"#2e5d8a"},
                {name:"Green",code:"#27ae60"},{name:"Red",code:"#c0392b"},
                {name:"Purple",code:"#8e44ad"},{name:"Orange",code:"#d35400"},
                {name:"Gray",code:"#7f8c8d"},{name:"DarkBlue",code:"#2c3e50"}
            ];

            // 현재 선택된 노드 목록 (멀티 포함)
            const getSelectedNodes = () => {
                const sel = Object.values(canvas.selected_nodes || {});
                // 현재 노드가 선택 목록에 없으면 자신만
                if (sel.length === 0) return [this];
                return sel;
            };

            let options = [
                {
                    content: "Delete",
                    callback: () => {
                        saveUndoState();
                        getSelectedNodes().forEach(n => graph.remove(n));
                        saveCurrentProject(true);
                    }
                },
                {
                    content: "Clear Image",
                    callback: () => {
                        saveUndoState();
                        getSelectedNodes().forEach(n => {
                            n.properties.imgData = null;
                            n._img_obj = null;
                        });
                        saveCurrentProject(true);
                        graph.setDirtyCanvas(true);
                    }
                },
                { content: "----------------", disabled: true }
            ];

            colors.forEach(c => {
                options.push({
                    content: `Color: ${c.name}`,
                    callback: () => {
                        saveUndoState();
                        getSelectedNodes().forEach(n => { n.properties.bgColor = c.code; });
                        saveCurrentProject(true);
                        graph.setDirtyCanvas(true);
                    }
                });
            });

            // Clone: 선택된 모든 노드 복제
            options.push({
                content: "Clone",
                callback: () => {
                    saveUndoState();
                    getSelectedNodes().forEach(n => {
                        const newNode = LiteGraph.createNode("map/text");
                        newNode.pos = [n.pos[0] + 30, n.pos[1] + 30];
                        newNode.size = [...n.size];
                        newNode.properties = JSON.parse(JSON.stringify(n.properties));
                        graph.add(newNode);
                    });
                    saveCurrentProject(true);
                }
            });

            return options;
        };

        SimpleTextNode.prototype.onMouseDown = function(e, pos) {
            if (e.altKey) {
                const match = this.properties.content.match(pathRegex);
                if (match) { openHyperlink(match[0]); return true; }
            }
        };

        SimpleTextNode.prototype.onDrawForeground = function(ctx) {
            if (this.flags.collapsed) return;
            ctx.save(); ctx.beginPath(); ctx.roundRect(0, 0, this.size[0], this.size[1], 12); ctx.clip();
            if (this.properties.imgData) {
                if (!this._img_obj || this._img_obj.src !== this.properties.imgData) {
                    this._img_obj = new Image(); this._img_obj.src = this.properties.imgData;
                }
                if (this._img_obj.complete) {
                    ctx.drawImage(this._img_obj, 0, 0, this.size[0], this.size[1]);
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0, 0, this.size[0], this.size[1]);
                }
            } else {
                ctx.fillStyle = this.properties.bgColor || "#1e1e1e"; ctx.fill();
            }
            ctx.restore();

            const lines = (this.properties.content || "").split('\n');
            ctx.font = `${NODE_FONT_SIZE}px monospace`; ctx.textAlign = "left";
            const startY = (this.size[1] - (lines.length * NODE_LINE_HEIGHT)) / 2 + NODE_FONT_SIZE;
            lines.forEach((line, i) => {
                const isLink = pathRegex.test(line); pathRegex.lastIndex = 0;
                ctx.fillStyle = isLink ? "#5fb3ff" : "#ffffff";
                ctx.fillText(line, 15, startY + (i * NODE_LINE_HEIGHT));
                if (isLink) {
                    const textWidth = ctx.measureText(line).width; ctx.strokeStyle = "#5fb3ff";
                    ctx.beginPath(); ctx.moveTo(15, startY + (i * NODE_LINE_HEIGHT) + 3);
                    ctx.lineTo(15 + textWidth, startY + (i * NODE_LINE_HEIGHT) + 3); ctx.stroke();
                }
            });
        };

        // ── [수정1] openEditor: 초기 높이 = 1줄, 줄바꿈 시 1줄씩 늘어남 ──
        SimpleTextNode.prototype.openEditor = function(isNew = false) {
            if (document.querySelector(".node-editor")) return;
            const area = document.createElement("textarea");
            area.className = "node-editor";
            area.value = isNew ? "" : this.properties.content;
            document.body.appendChild(area);

            const rect = canvas.canvas.getBoundingClientRect();
            const oldContent = this.properties.content;

            const syncSize = (text) => {
                this.properties.content = text;
                const lines = text.split('\n');
                const lineCount = lines.length;

                // 너비: 가장 긴 줄 기준
                const tmpCtx = canvas.canvas.getContext("2d");
                tmpCtx.font = `${NODE_FONT_SIZE}px monospace`;
                const maxLineW = lines.reduce((max, l) => Math.max(max, tmpCtx.measureText(l).width), 0);
                this.size[0] = Math.max(NODE_MIN_W, maxLineW + NODE_PAD_W);

                // [수정1 핵심] 높이: 줄 수에 정확히 비례
                this.size[1] = (lineCount * NODE_LINE_HEIGHT) + NODE_PAD_H;

                const scale = canvas.ds.scale;
                const offset = canvas.convertCanvasToOffset([this.pos[0], this.pos[1]]);
                const editorTop = (this.size[1] - (lineCount * NODE_LINE_HEIGHT)) / 2 + NODE_FONT_SIZE;

                area.style.left  = (offset[0] + rect.left + (15 * scale)) + "px";
                area.style.top   = (offset[1] + rect.top + (editorTop * scale) - (15 * scale)) + "px";
                area.style.width = (this.size[0] * scale - (30 * scale)) + "px";
                area.style.height = (lineCount * NODE_LINE_HEIGHT * scale + (10 * scale)) + "px";
                area.style.fontSize = (NODE_FONT_SIZE * scale) + "px";
                graph.setDirtyCanvas(true);
            };

            syncSize(area.value);
            setTimeout(() => area.focus(), 20);
            area.oninput = () => syncSize(area.value);
            area.onblur = () => {
                if (this.properties.content !== oldContent) saveUndoState();
                if (area.parentNode) document.body.removeChild(area);
                saveCurrentProject(true);
            };
        };

        LiteGraph.registerNodeType("map/text", SimpleTextNode);
        LiteGraph.NODE_TITLE_HEIGHT = 0;

        const graph = new LGraph();
        const canvas = new LGraphCanvas("#mycanvas", graph);
        canvas.allow_searchbox = false;

        window.addEventListener("mousemove", (e) => { lastMouseEvt = e; });

        window.addEventListener("keydown", (e) => {
            if (document.querySelector(".node-editor")) return;

            // Ctrl+Z : 실행 취소
            if (e.ctrlKey && (e.key === "z" || e.key === "Z")) { e.preventDefault(); undo(); }

            // Delete : 선택 노드 삭제
            if (e.key === "Delete") {
                const selected = Object.values(canvas.selected_nodes || {});
                if (selected.length > 0) { saveUndoState(); selected.forEach(n => graph.remove(n)); saveCurrentProject(true); }
            }

            // Ctrl+C : 복사
            if (e.ctrlKey && (e.key === "c" || e.key === "C")) {
                const selected = Object.values(canvas.selected_nodes || {});
                if (selected.length > 0) {
                    clipboard = selected.map(n => ({
                        type: n.type,
                        pos: [n.pos[0], n.pos[1]],
                        size: [...n.size],
                        properties: JSON.parse(JSON.stringify(n.properties))
                    }));
                }
            }

            // ── [수정3] Ctrl+V : 붙여넣기 — 중복 방지, 바로 아래 위치 ──
            if (e.ctrlKey && (e.key === "v" || e.key === "V")) {
                if (!clipboard || clipboard.length === 0) return;
                e.preventDefault();
                saveUndoState();

                // 원본 노드들의 바운딩 박스 계산 → 복사 기준점
                const minX = Math.min(...clipboard.map(d => d.pos[0]));
                const maxY = Math.max(...clipboard.map(d => d.pos[1] + d.size[1]));

                const PASTE_OFFSET_Y = 20; // 바로 아래 여백

                clipboard.forEach((data, i) => {
                    const n = LiteGraph.createNode(data.type);
                    // 원본 노드의 상대 위치를 유지하면서, 전체 그룹이 원본 바로 아래에 배치
                    n.pos = [
                        data.pos[0],                         // X는 원본과 동일
                        maxY + PASTE_OFFSET_Y + (data.pos[1] - Math.min(...clipboard.map(d => d.pos[1])))
                    ];
                    n.size = [...data.size];
                    n.properties = JSON.parse(JSON.stringify(data.properties));
                    graph.add(n);
                });

                // ★ 붙여넣기 후 클립보드를 초기화하여 중복 방지
                clipboard = null;

                saveCurrentProject(true);
            }

            // F2 : 선택 노드 편집
            if (e.key === "F2") {
                const node = canvas.selected_nodes ? Object.values(canvas.selected_nodes)[0] : null;
                if (node && node.openEditor) { e.preventDefault(); node.openEditor(); }
            }
        }, true);

        window.addEventListener("paste", async (e) => {
            const node = canvas.selected_nodes ? Object.values(canvas.selected_nodes)[0] : null;
            if (node) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        e.preventDefault();
                        const file = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            saveUndoState();
                            const optimizedData = await resizeImage(ev.target.result);
                            node.properties.imgData = optimizedData;
                            node._img_obj = null;
                            graph.setDirtyCanvas(true);
                            saveCurrentProject(true);
                        };
                        reader.readAsDataURL(file); break;
                    }
                }
            }
        }, true);

        function changeZoom(factor) {
            canvas.ds.scale = Math.min(Math.max(0.1, canvas.ds.scale * factor), 2);
            graph.setDirtyCanvas(true);
        }

        function spawnNodeAt(e) {
            const coord = canvas.convertEventToCanvasOffset(e);
            const target = graph.getNodeOnPos(coord[0], coord[1]);
            if (!target) {
                saveUndoState();
                const n = LiteGraph.createNode("map/text");
                // [수정1] 초기 높이 = 1줄
                n.size = [200, NODE_LINE_HEIGHT + NODE_PAD_H];
                n.pos = [coord[0] - n.size[0]/2, coord[1] - n.size[1]/2];
                graph.add(n);
                setTimeout(() => n.openEditor(true), 50);
            } else {
                target.openEditor();
            }
        }
        canvas.canvas.addEventListener("dblclick", spawnNodeAt);

        function loadProjectList() {
            const listDiv = document.getElementById("project-list"); listDiv.innerHTML = "";
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const sortedKeys = Object.keys(projects).sort((a,b) => (projects[a].order || 0) - (projects[b].order || 0));
            sortedKeys.forEach((id, index) => {
                const p = projects[id], item = document.createElement("div");
                item.className = "project-item" + (id === currentProjectId ? " active" : "");
                item.onclick = (e) => { if(!e.target.closest('.action-btn')) selectProject(id); };
                item.innerHTML = `<div class="project-main-info"><div class="project-name">${index + 1}. ${p.name}</div><div class="project-time">${p.updatedAt ? new Date(p.updatedAt).toLocaleString() : ""}</div></div><div class="project-actions"><div class="order-btns"><button class="action-btn" onclick="moveProject('${id}', -1)">▲</button><button class="action-btn" onclick="moveProject('${id}', 1)">▼</button></div><div style="display:flex; gap:2px;"><button class="action-btn" onclick="renameProject('${id}')">✏️</button><button class="action-btn" onclick="deleteProject('${id}')">❌</button></div></div>`;
                listDiv.appendChild(item);
            });
        }

        function createNewProject() {
            const name = prompt("Project Name:"); if (!name) return;
            const id = "p_" + Date.now(), projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const maxOrder = Object.values(projects).reduce((max, p) => Math.max(max, p.order || 0), -1);
            projects[id] = { name, data: null, offset: [0, 0], scale: 1, updatedAt: Date.now(), order: maxOrder + 1 };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); selectProject(id);
        }

        function moveProject(id, direction) {
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const sortedKeys = Object.keys(projects).sort((a,b) => (projects[a].order || 0) - (projects[b].order || 0));
            const idx = sortedKeys.indexOf(id), targetIdx = idx + direction;
            if (targetIdx >= 0 && targetIdx < sortedKeys.length) {
                const targetId = sortedKeys[targetIdx], tempOrder = projects[id].order || 0;
                projects[id].order = projects[targetId].order || 0; projects[targetId].order = tempOrder;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); loadProjectList();
            }
        }

        function renameProject(id) {
            const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const newName = prompt("New Name:", projects[id].name);
            if (newName) { projects[id].name = newName; localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); loadProjectList(); }
        }

        function deleteProject(id) {
            if (confirm("삭제하시겠습니까?")) {
                const projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); delete projects[id];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
                if (currentProjectId === id) { graph.clear(); currentProjectId = null; }
                loadProjectList();
            }
        }

        function exportAllProjects() {
            const blob = new Blob([localStorage.getItem(STORAGE_KEY)], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `${new Date().toISOString().split('T')[0]}_backup.json`; a.click();
        }

        function importAndRepair(event) {
            const reader = new FileReader(); reader.onload = (e) => {
                // 노드 타입 통일 + 슬롯 타입을 "number"로 통일하여 버전간 연결 호환
                let raw = e.target.result;
                raw = raw.replace(/"type"\s*:\s*"[^"]*"/g, (m) => m.includes("project_link") ? m : '"type":"map/text"');
                // 링크 슬롯 타입 정규화 (버전마다 달랐던 타입명 통일)
                raw = raw.replace(/"links"\s*:\s*\[([^\]]*)\]/g, (m) => m);
                const parsed = JSON.parse(raw);
                // 각 프로젝트의 그래프 데이터에서 노드 슬롯 타입 강제 통일
                Object.values(parsed).forEach(proj => {
                    if (proj.data && proj.data.nodes) {
                        proj.data.nodes.forEach(node => {
                            if (node.inputs)  node.inputs.forEach(s  => { s.type = "number"; s.name = s.name || ""; });
                            if (node.outputs) node.outputs.forEach(s => { s.type = "number"; s.name = s.name || ""; });
                        });
                        // 링크 타입도 통일
                        if (proj.data.links) {
                            proj.data.links.forEach(link => { if (link) link[5] = "number"; });
                        }
                    }
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
                loadProjectList(); alert("불러오기 완료 (버전간 연결 복구 적용)");
            };
            reader.readAsText(event.target.files[0]);
        }

        // ── 노션 수집함 동기화 ──────────────────────────────────────────────
        async function notionSyncMindmap() {
            let url;
            try { url = new URL('notion_inbox.json', window.location.href).href; }
            catch(e) { url = 'notion_inbox.json'; }

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('파일 없음 (HTTP ' + res.status + ')');
                const json = await res.json();
                const items = json.items || [];
                if (items.length === 0) { alert('노션 수집함이 비어있어요!'); return; }

                const synced_at = json.synced_at ? json.synced_at.slice(0,16).replace('T',' ') : '';

                if (!currentProjectId) {
                    alert('먼저 왼쪽에서 프로젝트를 선택해주세요!');
                    return;
                }

                const existingNodes = graph._nodes.filter(n =>
                    n.properties && n.properties.content && n.properties.content.startsWith('📥 노션 수집함')
                );
                existingNodes.forEach(n => graph.remove(n));

                const headerNode = LiteGraph.createNode('map/text');
                headerNode.pos = [50, 50];
                headerNode.size = [280, 60];
                headerNode.properties.bgColor = '#c0392b';
                headerNode.properties.content = '📥 노션 수집함 (NEW ' + items.length + ')\n' + synced_at;
                graph.add(headerNode);

                items.forEach((item, i) => {
                    const itemNode = LiteGraph.createNode('map/text');
                    itemNode.pos = [80, 130 + (i * 80)];
                    itemNode.size = [250, 60];
                    itemNode.properties.bgColor = '#2c3e50';
                    itemNode.properties.content = item.title;
                    graph.add(itemNode);
                    headerNode.connect(0, itemNode, 0);
                });

                graph.setDirtyCanvas(true, true);
                saveCurrentProject(true);

                alert('✅ 노션 수집함 동기화 완료!\n' + items.length + '개 항목\n동기화 시각: ' + synced_at);

            } catch(e) {
                alert('❌ 동기화 실패\n' + e.message + '\n\n먼저 PC에서 notion_sync.py를 실행하고\nnotion_inbox.json 파일을 이 HTML과 같은 폴더에 넣어주세요.');
            }
        }
        // ────────────────────────────────────────────────────────────────────

        window.onload = () => {
            loadProjectList();
            resizeCanvas();
            graph.start();

            // 모바일이면 시작할 때 사이드바 숨김
            if (window.innerWidth <= 768) {
                toggleSidebar(false);
            }
        };

        window.onresize = () => resizeCanvas();
    </script>
</body>
</html>
