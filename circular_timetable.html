<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원형 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c12;--s1:#13131c;--s2:#1a1a26;--s3:#222230;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.22);
  --t1:#eeeef8;--t2:#8888a8;--t3:#4a4a68;
  --acc:#7c6dfa;--acc2:#a89cfc;
  --clock-inner:#ffffff;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;height:100dvh;-webkit-tap-highlight-color:transparent;}

/* ── 헤더 ── */
header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;gap:8px;}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;}
.logo em{color:var(--acc2);font-style:normal;}
.hdate{font-family:'DM Mono',monospace;font-size:12px;color:#ffffff;font-weight:500;flex:1;text-align:center;}
.header-right{display:flex;gap:6px;align-items:center;}
.btn-icon{width:32px;height:32px;border:1px solid var(--b2);background:var(--s2);border-radius:9px;color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Noto Sans KR',sans-serif;}
.btn-icon:active{background:var(--s3);}
.btn-help{padding:0 10px;height:32px;border:1px solid var(--b2);background:var(--s2);border-radius:9px;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.btn-help:active{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-add{width:34px;height:34px;background:var(--acc);border:none;border-radius:10px;color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .1s;flex-shrink:0;}
.btn-add:active{transform:scale(.92);opacity:.85;}

/* ── syncBar (최소화) ── */
.sync-bar{display:flex;align-items:center;gap:6px;padding:2px 8px;flex-shrink:0;}
.sync-status{font-size:10px;white-space:nowrap;padding:2px 7px;border-radius:5px;}
.sync-status.ok{color:#4ecdc4;background:rgba(78,205,196,.12);}
.sync-status.err{color:#ff6b6b;background:rgba(255,107,107,.12);}
.sync-status.loading{color:var(--t2);background:var(--b1);}

/* ── 사용법 팝업 ── */
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.help-overlay.on{display:flex;}
.help-box{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:20px;width:100%;max-width:320px;}
.help-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--t1);}
.help-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:var(--t2);line-height:1.5;}
.help-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.btn-help-close{width:100%;margin-top:16px;padding:11px;border-radius:10px;border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── 날짜 네비게이터 ── */
.date-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 8px;background:var(--s1);border-bottom:1px solid var(--b1);
  flex-shrink:0;
}
.date-nav-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--b2);
  background:var(--s2);color:var(--t2);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .1s;
}
.date-nav-btn:active{background:var(--acc);color:#fff;border-color:var(--acc);}
.date-nav-center{flex:1;text-align:center;}
.date-nav-main{font-size:15px;font-weight:700;color:var(--t1);}
.date-nav-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.date-nav-today{
  padding:3px 10px;border-radius:6px;border:1px solid var(--b2);
  background:var(--s3);color:var(--acc2);font-size:11px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}
.date-nav-today:active{background:var(--acc);color:#fff;}

/* ── 날짜 도트 (7일 인디케이터) ── */
.date-dots{display:flex;gap:5px;justify-content:center;padding:1px 0 1px;}
.date-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--s3);border:1px solid var(--b2);
  cursor:pointer;transition:all .15s;
}
.date-dot.has{background:var(--acc);opacity:.5;}
.date-dot.active{background:var(--acc);opacity:1;transform:scale(1.3);}
.date-dot.today{border-color:var(--acc2);}

/* ── 시계 스와이프 애니메이션 ── */
.clock-slide{transition:transform .25s cubic-bezier(.32,.72,0,1),opacity .25s;}
.clock-slide.out-left{transform:translateX(-60px);opacity:0;}
.clock-slide.out-right{transform:translateX(60px);opacity:0;}
.clock-slide.in-left{transform:translateX(60px);opacity:0;}
.clock-slide.in-right{transform:translateX(-60px);opacity:0;}
.vtab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;color:var(--t3);text-align:center;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:'Noto Sans KR',sans-serif;}
.vtab.on{color:var(--acc2);border-bottom-color:var(--acc2);}

main{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;}
.view.on{display:block;}

/* ── 시계 sticky ── */
.clock-wrap{display:flex;flex-direction:column;align-items:center;padding:0;}
.clock-sticky{position:sticky;top:0;z-index:20;background:var(--bg);width:100%;display:flex;flex-direction:column;align-items:center;padding:0 0 2px;}
.clock-outer{position:relative;width:min(99vw,460px);height:min(99vw,460px);flex-shrink:0;}
#clockSvg{width:100%;height:100%;display:block;touch-action:none;}
.clock-center-info{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:140px;}
.clock-time{font-family:'DM Mono',monospace;font-size:31px;font-weight:500;color:#1a1a2e;line-height:1.1;}
.clock-sub{font-size:13px;color:#9090b0;margin-top:2px;}

/* ── 인라인 목록 (시계 아래) ── */
.inline-list{width:100%;padding:0 0 30px;}
.inline-section-header{
  font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:1px;
  padding:10px 14px 4px;display:flex;align-items:center;gap:6px;
}
.inline-section-header .badge{background:var(--s3);border:1px solid var(--b2);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--t2);}

/* ── 메모 말풍선 ── */
#memoCallouts{width:100%;padding:0 12px;margin-top:4px;}
.memo-callout{
  display:flex;align-items:flex-start;gap:8px;
  background:var(--s2);border:1px solid var(--b2);border-radius:10px;
  padding:8px 12px;margin-bottom:6px;position:relative;
}
.memo-callout::before{
  content:'';position:absolute;top:12px;left:-7px;
  border:6px solid transparent;border-right-color:var(--b2);
}
.memo-callout-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.memo-callout-body{flex:1;min-width:0;}
.memo-callout-title{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:2px;}
.memo-callout-text{font-size:12px;color:var(--t1);line-height:1.5;word-break:keep-all;}

/* ── 인라인 목록 (시계 아래) ── */
.inline-list{width:100%;padding:0 0 20px;}
.inline-section-header{
  font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:1px;
  padding:14px 12px 5px;display:flex;align-items:center;gap:6px;
}
.inline-section-header .badge{background:var(--s3);border:1px solid var(--b2);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--t2);}

/* ── 스와이프 아이템 ── */
.swipe-wrap{position:relative;overflow:hidden;border-radius:10px;margin:0 12px 5px;}
.swipe-del-bg{
  position:absolute;top:0;right:0;bottom:0;width:80px;
  background:#ff4444;border-radius:0 10px 10px 0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;
  transition:width .15s;
}
.inline-item{
  position:relative;z-index:1;
  display:flex;align-items:stretch;gap:9px;
  background:var(--s2);border-radius:10px;
  padding:10px 11px;border:1px solid var(--b1);
  transition:transform .18s cubic-bezier(.25,.46,.45,.94), background .15s;
  touch-action:pan-y;
  will-change:transform;
}
.inline-item.github{border-left:2px solid #4ecdc4;}
.inline-item.notime{opacity:0.65;}
.inline-item-color{width:3px;border-radius:2px;flex-shrink:0;}
.inline-item-body{flex:1;min-width:0;}
.inline-item-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inline-item-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);}
.inline-item-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.inline-item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.inline-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.inline-btn:active{background:var(--b2);}
.swipe-hint{font-size:10px;color:var(--t3);text-align:center;padding:2px 12px 8px;}

/* ── GitHub 동기화 패널 ── */
.sync-bar{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:9px 12px;margin:0 12px 10px;}
.sync-bar input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;min-width:0;}
.sync-bar input::placeholder{color:var(--t3);}
.sync-status{font-size:10px;white-space:nowrap;padding:2px 8px;border-radius:5px;}
.sync-status.ok{color:#4ecdc4;background:rgba(78,205,196,.12);}
.sync-status.err{color:#ff6b6b;background:rgba(255,107,107,.12);}
.sync-status.loading{color:var(--t2);background:var(--b1);}
.btn-sync{padding:5px 10px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--acc2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.btn-sync:active{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ── 목록 뷰 ── */
.list-wrap{padding:10px 12px;}
.list-section-header{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:8px 2px 5px;display:flex;align-items:center;gap:6px;}
.list-section-header .badge{background:var(--s3);border:1px solid var(--b2);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--t2);}
.sched-item{display:flex;align-items:stretch;gap:9px;background:var(--s2);border-radius:10px;padding:10px 11px;margin-bottom:5px;border:1px solid var(--b1);transition:background .15s;}
.sched-item:active{background:var(--s3);}
.sched-item.github{border-left:2px solid #4ecdc4;}
.sched-color-bar{width:3px;border-radius:2px;flex-shrink:0;}
.sched-body{flex:1;min-width:0;}
.sched-title{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.sched-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);}
.sched-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;}
.tag.repeat{color:var(--acc2);background:rgba(124,109,250,.14);}
.tag.gh{color:#4ecdc4;background:rgba(78,205,196,.12);}
.sched-memo{font-size:11px;color:var(--t3);margin-top:2px;}
.sched-actions{display:flex;align-items:center;gap:4px;}
.sched-btn{width:27px;height:27px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sched-btn:active{background:var(--b2);}
.sched-btn.del{color:#ff6b6b;}
.empty-state{text-align:center;padding:44px 20px;color:var(--t3);font-size:13px;line-height:2;}

/* ── 바텀 시트 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(3px);}
.overlay.on{display:flex;}
.sheet{width:100%;max-height:93dvh;background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--b2);border-bottom:none;overflow-y:auto;padding-bottom:max(env(safe-area-inset-bottom,0px),24px);animation:slideUp .25s cubic-bezier(.32,1.1,.6,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--b3);margin:12px auto 0;}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 12px;border-bottom:1px solid var(--b1);}
.sheet-title{font-size:15px;font-weight:700;}
.btn-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:15px 18px;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11px;font-weight:500;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fi,.fta,.fsel{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.fi:focus,.fta:focus,.fsel:focus{border-color:var(--acc);}
.fi{font-family:'DM Mono',monospace;}
.fta{resize:none;height:60px;line-height:1.5;}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{padding:6px 9px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s;}
.qbtn:active{background:var(--acc);color:#fff;border-color:var(--acc);}
.color-row{display:flex;gap:7px;flex-wrap:wrap;}
.color-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .1s;}
.color-opt:active{transform:scale(.88);}
.color-opt.on{border-color:#fff;transform:scale(1.08);}
.check-row{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:10px;padding:11px 12px;}
.check-label{font-size:13px;flex:1;}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--s3);border:1px solid var(--b2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--acc);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}
.repeat-opts{display:none;margin-top:7px;background:var(--s2);border-radius:10px;padding:9px 12px;gap:6px;flex-wrap:wrap;}
.repeat-opts.on{display:flex;}
.repbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s;}
.repbtn.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-save{width:100%;padding:13px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Noto Sans KR',sans-serif;transition:opacity .1s,transform .1s;}
.btn-save:active{opacity:.85;transform:scale(.98);}

/* ── GitHub 설정 시트 ── */
.gh-info{background:var(--s2);border-radius:10px;padding:11px 13px;margin-bottom:12px;font-size:12px;color:var(--t2);line-height:1.7;}
.gh-info code{color:var(--acc2);font-family:'DM Mono',monospace;font-size:11px;}
.gh-url-row{display:flex;gap:7px;align-items:flex-start;}
.gh-url-row .fi{flex:1;}
.btn-gh-save{padding:10px 14px;border-radius:10px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

/* ── 드래그 미리보기 ── */
.drag-arc{pointer-events:none;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-size:13px;padding:8px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<header>
  <button class="btn-help" id="btnHelp">사용법</button>
  <div class="hdate" id="hdate"></div>
  <div class="header-right">
    <button class="btn-icon" id="btnNotionSettings" title="동기화">🔄</button>
    <button class="btn-add" id="btnAdd" aria-label="일정 추가">+</button>
  </div>
</header>

<!-- 날짜 네비게이터 -->
<div class="date-nav">
  <button class="date-nav-btn" id="btnPrevDay">‹</button>
  <div class="date-nav-center">
    <div class="date-nav-main" id="dateNavMain"></div>
    <div class="date-nav-sub" id="dateNavSub"></div>
  </div>
  <button class="date-nav-today" id="btnToday">오늘</button>
  <button class="date-nav-btn" id="btnNextDay">›</button>
</div>
<!-- 7일 도트 인디케이터 -->
<div class="date-dots" id="dateDots"></div>

<nav class="view-tabs" style="display:none;"></nav>

<main>
  <div class="view on" id="vClock" style="overflow-y:auto;">
    <!-- 동기화 상태 (최소) -->
    <div class="sync-bar" id="syncBar">
      <span style="font-size:11px;">📅</span>
      <span class="sync-status loading" id="syncStatus">동기화 중...</span>
    </div>
    <div class="clock-wrap">
      <!-- 시계: sticky -->
      <div class="clock-sticky" id="clockSticky">
        <div class="clock-outer">
          <svg id="clockSvg" viewBox="-80 -80 560 560" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="clock-center-info">
            <div class="clock-time" id="nowTime">--:--</div>
            <div class="clock-sub">현재 시각</div>
          </div>
        </div>
      </div>
      <!-- 목록 -->
      <div class="inline-list" id="inlineList"></div>
    </div>
  </div>
</main>

<!-- 사용법 팝업 -->
<div class="help-overlay" id="helpOverlay">
  <div class="help-box">
    <div class="help-title">사용법</div>
    <div class="help-row"><span class="help-icon">👆</span><span>시계 링 위를 <b>드래그</b>하면 시간 범위를 지정해서 일정을 추가할 수 있어요</span></div>
    <div class="help-row"><span class="help-icon">◀▶</span><span>시계를 <b>좌우로 스와이프</b>하거나 상단 ‹ › 버튼으로 날짜를 이동해요 (최대 7일 후까지)</span></div>

<!-- (노션 설정 시트 제거됨 - DailySchedule localStorage 직접 읽기) -->

<div class="toast" id="toast"></div>

<script>
// ════ 상수 & 상태 ════
const COLORS=['#7c6dfa','#ff6b9d','#ffd166','#4ecdc4','#ff9f43','#a29bfe','#70e1f5','#ff6b6b'];
const RMAP={daily:'매일',weekday:'평일',weekend:'주말',weekly:'매주'};
const NS='http://www.w3.org/2000/svg';
const CX=200,CY=200,R=178,RI=92; // RI = 내부 원 반지름 (흰색)

const TODAY = new Date().toLocaleDateString('sv-SE');

// 기존 일정 마이그레이션 (날짜 없는 항목 → 오늘)
let schedules = JSON.parse(localStorage.getItem('circ_local')||'[]')
  .map(s=>({...s, date: s.date||TODAY}));
localStorage.setItem('circ_local', JSON.stringify(schedules));

let notionSchedules = [];
let dsNoTime = [];
let currentDate = TODAY;

// 숨긴 DS 항목 (날짜별)
function hiddenKey(d){ return 'circ_hidden_'+d; }
function getHidden(d){ return new Set(JSON.parse(localStorage.getItem(hiddenKey(d))||'[]')); }
function saveHidden(){ localStorage.setItem(hiddenKey(currentDate), JSON.stringify([...hiddenIds])); }
let hiddenIds = getHidden(TODAY);

let editId=null, selColor=COLORS[0], selRepeat='daily', repeatOn=false;

// ════ DailySchedule 동기화 설정 ════
// localStorage 키: 'dailySchedule_v4' (DailySchedule 앱과 동일)

// 드래그 상태
let dragState=null; // {startAngle, previewEl}

// ════ 유틸 ════
// circular 자체 일정을 JSONbin circular_routines 와 양방향 동기화
// (localStorage 'circ_local' 은 오프라인 캐시로 유지)
let routinesSyncTimer = null;
let routinesSyncing = false;

function saveLocal(){
  localStorage.setItem('circ_local', JSON.stringify(schedules));
  // 입력이 연이어 들어올 수 있어 디바운스 — 마지막 변경 1초 후 JSONbin 푸시
  clearTimeout(routinesSyncTimer);
  routinesSyncTimer = setTimeout(pushRoutinesToJsonbin, 1000);
}

async function pushRoutinesToJsonbin(){
  if(routinesSyncing) return;
  routinesSyncing = true;
  try{
    // 현재 JSONbin 데이터 GET
    const get = await fetch(CIRC_JSONBIN_URL + '/latest',
      { headers: {'X-Master-Key': CIRC_JSONBIN_KEY} });
    if(!get.ok) throw new Error('GET '+get.status);
    const rec = (await get.json()).record || {};
    rec.circular_routines = schedules.slice();
    // PUT
    const put = await fetch(CIRC_JSONBIN_URL, {
      method:'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key': CIRC_JSONBIN_KEY},
      body: JSON.stringify(rec)
    });
    if(!put.ok) throw new Error('PUT '+put.status);
    // 캐시 갱신
    localStorage.setItem('progress_v1', JSON.stringify(rec));
  }catch(e){
    // 동기화 실패해도 로컬은 이미 저장됨 — 다음 변경 시 재시도
    console.warn('routines 동기화 실패(로컬은 저장됨):', e);
  }finally{
    routinesSyncing = false;
  }
}

// JSONbin에서 circular_routines 가져와 다른 기기에서 만든 일정 합치기
async function pullRoutinesFromJsonbin(){
  try{
    const res = await fetch(CIRC_JSONBIN_URL + '/latest',
      { headers: {'X-Master-Key': CIRC_JSONBIN_KEY} });
    if(!res.ok) return;
    const rec = (await res.json()).record || {};
    const remote = rec.circular_routines || [];
    // 같은 id면 ts 새로운 쪽 우선. 없는 id 추가.
    const map = new Map();
    schedules.forEach(s => map.set(String(s.id), s));
    let changed = false;
    remote.forEach(r => {
      if(!r || !r.id) return;
      const key = String(r.id);
      const cur = map.get(key);
      if(!cur){
        map.set(key, r);
        changed = true;
      } else {
        const rt = r.ts || 0, ct = cur.ts || 0;
        if(rt > ct){ map.set(key, r); changed = true; }
      }
    });
    if(changed){
      schedules = Array.from(map.values()).map(s=>({...s, date: s.date||TODAY}));
      localStorage.setItem('circ_local', JSON.stringify(schedules));
      // 캐시 갱신
      localStorage.setItem('progress_v1', JSON.stringify(rec));
      // 화면이 이미 그려져 있으면 다시 그림
      if(typeof drawClock === 'function'){ drawClock(); drawInlineList(); }
    }
  }catch(e){
    console.warn('routines pull 실패:', e);
  }
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function timeToMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minsToTime(m){const mm=((m%1440)+1440)%1440;return `${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function durLabel(s,e){let d=timeToMins(e)-timeToMins(s);if(d<=0)d+=1440;const h=Math.floor(d/60),m=d%60;return h?(m?`${h}시간 ${m}분`:`${h}시간`):`${m}분`;}

// ════ SVG 헬퍼 ════
function svgEl(tag,a){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
function pol(r,deg){const rad=deg*Math.PI/180;return[CX+r*Math.cos(rad),CY+r*Math.sin(rad)];}
function timeToAngle(t){const[h,m]=t.split(':').map(Number);return((h+m/60)/24)*360-90;}
function angleToSnap(deg){
  let d=((deg+90)+3600)%360;
  let total=(d/360)*24*60;
  let snapped=Math.round(total/30)*30;
  return minsToTime(snapped);
}

function hexRgba(hex,a){
  if(!hex||hex.length<7)return`rgba(124,109,250,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function wedgePath(aS,aE){
  let sweep=aE-aS; if(sweep<=0)sweep+=360; if(sweep>359.9)sweep=359.9;
  const s=pol(R,aS),e=pol(R,aS+sweep);
  const large=sweep>180?1:0;
  return`M${CX},${CY} L${s[0]},${s[1]} A${R},${R} 0 ${large},1 ${e[0]},${e[1]} Z`;
}
function arcOnlyPath(aS,aE){
  let sweep=aE-aS; if(sweep<=0)sweep+=360; if(sweep>359.9)sweep=359.9;
  const s=pol(R,aS),e=pol(R,aS+sweep);
  const large=sweep>180?1:0;
  return`M${s[0]},${s[1]} A${R},${R} 0 ${large},1 ${e[0]},${e[1]}`;
}

// ════ 병합된 일정 목록 ════
function allSchedules(){
  const h = hiddenIds;
  return [...schedules, ...notionSchedules].filter(s=>{
    if(h.has(String(s.id))) return false;
    if(s.repeat){
      // 반복 일정: currentDate 기준으로 표시 여부 판단
      const d = new Date(currentDate);
      const dow = d.getDay(); // 0=일,1=월...6=토
      if(s.repeat==='daily') return true;
      if(s.repeat==='weekday') return dow>=1&&dow<=5;
      if(s.repeat==='weekend') return dow===0||dow===6;
      if(s.repeat==='weekly'){
        // 원래 날짜와 요일 같으면 표시
        const orig = new Date(s.date||TODAY);
        return orig.getDay()===dow;
      }
      return true;
    }
    return (s.date||TODAY) === currentDate;
  });
}

// ════ 키워드 → 캐릭터 매핑 ════
function detectCharType(title){
  const t=title.toLowerCase();
  if(/수면|취침|잠|기상|sleep|자기/.test(t))   return 'sleep';
  if(/러닝|달리기|조깅|running|run/.test(t))    return 'run';
  if(/팔굽|푸시업|push|복근|근력|헬스|gym|fitness|불가리안|아령|운동/.test(t)) return 'workout';
  if(/에어컨|청소|업무|work|cleaning|클리닝|이룸|파란|빛나라/.test(t)) return 'work';
  if(/기타|guitar|연주|밴드/.test(t))           return 'guitar';
  if(/아침|점심|저녁|식사|밥|국수|라면|pasta|lunch|dinner|breakfast|먹/.test(t)) return 'meal';
  if(/독서|책|읽|book|read/.test(t))            return 'read';
  if(/공부|스터디|study|학습|수업|강의|lesson/.test(t)) return 'study';
  return null;
}

// SVG 캐릭터 그리기 (cx,cy = 중심, size = 크기)
function drawCharacter(svg, type, cx, cy, size){
  const s = size;
  const g = svgEl('g', {transform:`translate(${cx},${cy})`});

  // 공통 애니메이션 ID (중복 방지)
  const uid = Math.random().toString(36).slice(2,6);

  if(type==='sleep'){
    // 초승달
    const moon = svgEl('path',{d:`M${s*.4} ${-s*.6} Q${s*.1} ${-s*.2} ${s*.1} ${s*.2} Q${s*.1} ${s*.6} ${s*.4} ${s*.6} Q${-s*.5} ${s*.6} ${-s*.6} ${s*.1} Q${-s*.7} ${-s*.3} ${-s*.1} ${-s*.5} Z`, fill:'#FFCC00'});
    g.appendChild(moon);
    // 양
    const sheep = svgEl('g',{});
    const b1=svgEl('ellipse',{cx:'0',cy:`${s*.5}`,rx:`${s*.35}`,ry:`${s*.22}`,fill:'white',stroke:'#ddd','stroke-width':'0.5'});
    const b2=svgEl('circle',{cx:`${-s*.2}`,cy:`${s*.35}`,r:`${s*.18}`,fill:'white',stroke:'#ddd','stroke-width':'0.5'});
    const b3=svgEl('circle',{cx:`${s*.05}`,cy:`${s*.28}`,r:`${s*.18}`,fill:'white',stroke:'#ddd','stroke-width':'0.5'});
    const b4=svgEl('circle',{cx:`${s*.25}`,cy:`${s*.35}`,r:`${s*.18}`,fill:'white',stroke:'#ddd','stroke-width':'0.5'});
    const head=svgEl('circle',{cx:`${s*.44}`,cy:`${s*.42}`,r:`${s*.14}`,fill:'#FFD580'});
    const eye=svgEl('ellipse',{cx:`${s*.45}`,cy:`${s*.4}`,rx:`${s*.04}`,ry:`${s*.04}`,fill:'#333'});
    [b1,b2,b3,b4,head,eye].forEach(x=>sheep.appendChild(x));
    // 점프 애니메이션
    const anim=svgEl('animateTransform',{attributeName:'transform',type:'translate',values:`0,0;0,${-s*.2};0,0`,dur:'1s',repeatCount:'indefinite'});
    sheep.appendChild(anim);
    g.appendChild(sheep);
    // ZZZ
    ['Z','Z','Z'].forEach((z,i)=>{
      const zt=svgEl('text',{x:`${s*(0.1+i*0.18)}`,y:`${-s*.3-i*s*.15}`,fill:'#aaa','font-size':`${s*.22}`,'text-anchor':'middle',opacity:'0','font-family':'sans-serif'});
      zt.textContent='z';
      const a1=svgEl('animate',{attributeName:'opacity',values:'0;0.8;0',dur:'2s',begin:`${i*0.6}s`,repeatCount:'indefinite'});
      const a2=svgEl('animate',{attributeName:'y',values:`${-s*.3-i*s*.15};${-s*.5-i*s*.15};${-s*.3-i*s*.15}`,dur:'2s',begin:`${i*0.6}s`,repeatCount:'indefinite'});
      zt.appendChild(a1); zt.appendChild(a2); g.appendChild(zt);
    });
    g.appendChild(sheep);
  }

  else if(type==='run'){
    // 머리
    const head=svgEl('circle',{cx:'0',cy:`${-s*.5}`,r:`${s*.28}`,fill:'#FFD580'});
    const eye1=svgEl('ellipse',{cx:`${-s*.1}`,cy:`${-s*.53}`,rx:`${s*.06}`,ry:`${s*.07}`,fill:'#333'});
    const eye2=svgEl('ellipse',{cx:`${s*.1}`,cy:`${-s*.53}`,rx:`${s*.06}`,ry:`${s*.07}`,fill:'#333'});
    const mouth=svgEl('path',{d:`M${-s*.1} ${-s*.42} Q0 ${-s*.35} ${s*.1} ${-s*.42}`,fill:'none',stroke:'#333','stroke-width':`${s*.04}`,'stroke-linecap':'round'});
    // 몸
    const body=svgEl('ellipse',{cx:'0',cy:`${s*.05}`,rx:`${s*.22}`,ry:`${s*.3}`,fill:'#FF9F43'});
    // 땀
    const sweat=svgEl('ellipse',{cx:`${s*.38}`,cy:`${-s*.5}`,rx:`${s*.07}`,ry:`${s*.1}`,fill:'#5AC8FA',opacity:'0.8'});
    const sa=svgEl('animate',{attributeName:'opacity',values:'0.8;0;0.8',dur:'1s',repeatCount:'indefinite'});
    const sa2=svgEl('animate',{attributeName:'cy',values:`${-s*.5};${-s*.35};${-s*.5}`,dur:'1s',repeatCount:'indefinite'});
    sweat.appendChild(sa); sweat.appendChild(sa2);
    // 다리
    const leg1=svgEl('line',{x1:`${-s*.1}`,y1:`${s*.32}`,x2:`${-s*.3}`,y2:`${s*.65}`,stroke:'#FFB347','stroke-width':`${s*.12}`,'stroke-linecap':'round'});
    const leg2=svgEl('line',{x1:`${s*.1}`,y1:`${s*.32}`,x2:`${s*.3}`,y2:`${s*.65}`,stroke:'#FFB347','stroke-width':`${s*.12}`,'stroke-linecap':'round'});
    const la1=svgEl('animate',{attributeName:'x2',values:`${-s*.3};${-s*.1};${-s*.3}`,dur:'0.5s',repeatCount:'indefinite'});
    const la2=svgEl('animate',{attributeName:'y2',values:`${s*.65};${s*.5};${s*.65}`,dur:'0.5s',repeatCount:'indefinite'});
    const la3=svgEl('animate',{attributeName:'x2',values:`${s*.3};${s*.1};${s*.3}`,dur:'0.5s',repeatCount:'indefinite',begin:'0.25s'});
    const la4=svgEl('animate',{attributeName:'y2',values:`${s*.65};${s*.5};${s*.65}`,dur:'0.5s',repeatCount:'indefinite',begin:'0.25s'});
    leg1.appendChild(la1); leg1.appendChild(la2);
    leg2.appendChild(la3); leg2.appendChild(la4);
    // 팔
    const arm1=svgEl('line',{x1:`${-s*.2}`,y1:`${-s*.05}`,x2:`${-s*.5}`,y2:`${s*.15}`,stroke:'#FFB347','stroke-width':`${s*.1}`,'stroke-linecap':'round'});
    const arm2=svgEl('line',{x1:`${s*.2}`,y1:`${-s*.05}`,x2:`${s*.5}`,y2:`${s*.15}`,stroke:'#FFB347','stroke-width':`${s*.1}`,'stroke-linecap':'round'});
    const aa1=svgEl('animate',{attributeName:'x2',values:`${-s*.5};${-s*.3};${-s*.5}`,dur:'0.5s',repeatCount:'indefinite'});
    const aa2=svgEl('animate',{attributeName:'x2',values:`${s*.5};${s*.3};${s*.5}`,dur:'0.5s',repeatCount:'indefinite',begin:'0.25s'});
    arm1.appendChild(aa1); arm2.appendChild(aa2);
    [head,eye1,eye2,mouth,body,sweat,leg1,leg2,arm1,arm2].forEach(x=>g.appendChild(x));
  }

  else if(type==='workout'){
    // 푸시업 캐릭터
    const head=svgEl('circle',{cx:`${s*.5}`,cy:`${-s*.2}`,r:`${s*.25}`,fill:'#FFD580'});
    const eye1=svgEl('ellipse',{cx:`${s*.43}`,cy:`${-s*.22}`,rx:`${s*.05}`,ry:`${s*.05}`,fill:'#333'});
    const eye2=svgEl('ellipse',{cx:`${s*.57}`,cy:`${-s*.22}`,rx:`${s*.05}`,ry:`${s*.05}`,fill:'#333'});
    const body=svgEl('rect',{x:`${-s*.4}`,y:`${s*.0}`,width:`${s*.8}`,height:`${s*.3}`,rx:`${s*.1}`,fill:'#FF9F43'});
    const arm1=svgEl('line',{x1:`${-s*.35}`,y1:`${s*.15}`,x2:`${-s*.5}`,y2:`${s*.55}`,stroke:'#FFB347','stroke-width':`${s*.1}`,'stroke-linecap':'round'});
    const arm2=svgEl('line',{x1:`${s*.15}`,y1:`${s*.15}`,x2:`${s*.0}`,y2:`${s*.55}`,stroke:'#FFB347','stroke-width':`${s*.1}`,'stroke-linecap':'round'});
    // 바운스
    const ba=svgEl('animateTransform',{attributeName:'transform',type:'translate',values:`0,0;0,${-s*.15};0,0`,dur:'0.7s',repeatCount:'indefinite'});
    const sweat=svgEl('ellipse',{cx:`${s*.78}`,cy:`${-s*.38}`,rx:`${s*.06}`,ry:`${s*.09}`,fill:'#5AC8FA',opacity:'0.8'});
    const sw_a=svgEl('animate',{attributeName:'opacity',values:'0.8;0;0.8',dur:'0.7s',repeatCount:'indefinite'});
    sweat.appendChild(sw_a);
    g.appendChild(ba);
    [head,eye1,eye2,body,arm1,arm2,sweat].forEach(x=>g.appendChild(x));
  }

  else if(type==='work'){
    // 에어컨

function drawClock(){
  const svg=document.getElementById('clockSvg');
  svg.innerHTML='';

  // ① 배경 원 (다크)
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R,fill:'#13131c',stroke:'rgba(255,255,255,0.05)','stroke-width':'1'}));

  // ② 일정 블록
  allSchedules().forEach(s=>{
    const aS=timeToAngle(s.start);
    const aE=timeToAngle(s.end);
    const c=s.color||COLORS[0];

    svg.appendChild(svgEl('path',{d:wedgePath(aS,aE),fill:hexRgba(c,0.22)}));
    svg.appendChild(svgEl('path',{d:arcOnlyPath(aS,aE),fill:'none',stroke:c,'stroke-width':'3.5','stroke-linecap':'round'}));

    let sweep=aE-aS; if(sweep<=0)sweep+=360;
    const mid=aS+sweep/2;
    const charType=detectCharType(s.title);
    const ringMid=(R+RI)/2;

    if(charType && sweep>=30){
      // 캐릭터 크기: 블록 각도에 따라 조절
      const charSize = Math.min(sweep/360 * R * 1.1, 28);
      const lp=pol(ringMid, mid);
      drawCharacter(svg, charType, lp[0], lp[1], charSize);
    } else if(sweep>=12){
      // 캐릭터 없으면 텍스트 라벨
      const lr=pol(ringMid, mid);
      const lbl=svgEl('text',{x:lr[0],y:lr[1],fill:c,'font-size':'13','text-anchor':'middle','dominant-baseline':'middle','font-family':'Noto Sans KR,sans-serif','font-weight':'500'});
      lbl.textContent=s.title.length>5?s.title.slice(0,4)+'…':s.title;
      svg.appendChild(lbl);
    }
  });

  // ③ 내부 흰 원 (clock face)
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:RI,fill:'#ffffff',stroke:'rgba(0,0,0,0.06)','stroke-width':'1'}));

  // ④ 눈금 & 숫자
  for(let h=0;h<24;h++){
    const a=(h/24)*360-90;
    const oR=R-1, iR_h=R-13, iR_30=R-8;
    const o=pol(oR,a), i=pol(iR_h,a);
    svg.appendChild(svgEl('line',{x1:o[0],y1:o[1],x2:i[0],y2:i[1],stroke:'rgba(255,255,255,0.25)','stroke-width':'1.5','stroke-linecap':'round'}));
    // 30분
    const a2=((h+.5)/24)*360-90;
    const o2=pol(oR,a2),i2=pol(iR_30,a2);
    svg.appendChild(svgEl('line',{x1:o2[0],y1:o2[1],x2:i2[0],y2:i2[1],stroke:'rgba(255,255,255,0.1)','stroke-width':'1','stroke-linecap':'round'}));
    // 숫자 (내부 원 바깥쪽 링 영역)
    const np=pol(R-22,a);
    const big=h%6===0;
    const num=svgEl('text',{x:np[0],y:np[1],fill:big?'rgba(255,255,255,.75)':'rgba(255,255,255,.3)','font-size':big?'14':'12','font-weight':big?'500':'400','text-anchor':'middle','dominant-baseline':'middle','font-family':'DM Mono,monospace'});
    num.textContent=String(h).padStart(2,'0');
    svg.appendChild(num);
  }

  // ⑤ 외곽 링
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R,fill:'none',stroke:'rgba(255,255,255,0.07)','stroke-width':'1.5'}));

  // ⑥ 현재 시각 바늘 (흰 내부 원 위에 그려짐 → 빨간색)
  const now=new Date();
  const na=((now.getHours()+now.getMinutes()/60)/24)*360-90;
  const np=pol(R-4,na);
  // 바늘 그림자
  svg.appendChild(svgEl('line',{x1:CX,y1:CY,x2:np[0],y2:np[1],stroke:'rgba(0,0,0,.15)','stroke-width':'5','stroke-linecap':'round'}));
  svg.appendChild(svgEl('line',{x1:CX,y1:CY,x2:np[0],y2:np[1],stroke:'#ff4444','stroke-width':'2.5','stroke-linecap':'round'}));
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:'5',fill:'#ff4444'}));

  // 메모 지시선
  drawMemoLeaders(svg);

  // 현재 시각 텍스트
  const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('nowTime').textContent=`${hh}:${mm}`;

  drawInlineList();
}

// 링 바깥 말풍선 그리기
function drawMemoLeaders(svg){
  const items = allSchedules().filter(s=>s.memo);
  if(!items.length) return;

  items.forEach(s=>{
    const c = s.color || COLORS[0];
    const aS = timeToAngle(s.start);
    const aE = timeToAngle(s.end);
    let sweep = aE - aS; if(sweep<=0) sweep+=360;
    const mid = aS + sweep/2; // 블록 중간 각도

    // 지시선 시작점 (링 바로 바깥)
    const pStart = pol(R+4, mid);
    // 지시선 끝점 (말풍선 앵커, 링에서 38px 바깥)
    const LEADER = 48;
    const pEnd = pol(R + LEADER, mid);

    // 말풍선 텍스트 준비
    const memoShort = s.memo.length > 12 ? s.memo.slice(0,11)+'…' : s.memo;
    const bW = Math.min(memoShort.length * 8 + 20, 130);
    const bH = 36;

    // 말풍선 위치: pEnd 기준, 각도에 따라 좌/우 정렬
    const radMid = mid * Math.PI / 180;
    const isRight = Math.cos(radMid) >= 0; // 오른쪽 반구면 오른쪽 정렬
    const isBottom = Math.sin(radMid) >= 0; // 아래쪽 반구
    const bX = isRight ? pEnd[0] + 4 : pEnd[0] - bW - 4;
    const bY = pEnd[1] - bH/2;

    // 지시선 (점선)
    const line = svgEl('line',{
      x1:pStart[0], y1:pStart[1],
      x2:pEnd[0],   y2:pEnd[1],
      stroke:c, 'stroke-width':'1.2',
      'stroke-linecap':'round',
      'stroke-dasharray':'3 2',
      opacity:'0.85'
    });
    svg.appendChild(line);

    // 말풍선 배경
    const bubble = svgEl('rect',{
      x:bX, y:bY,
      width:bW, height:bH,
      rx:'6',
      fill:'rgba(19,19,28,0.92)',
      stroke:c, 'stroke-width':'1'
    });
    svg.appendChild(bubble);

    // 말풍선 꼬리 (삼각형, 지시선 방향쪽)
    const tailX = isRight ? bX : bX + bW;
    const tailPts = isRight
      ? `${tailX},${bY+bH/2-4} ${tailX-6},${bY+bH/2} ${tailX},${bY+bH/2+4}`
      : `${tailX},${bY+bH/2-4} ${tailX+6},${bY+bH/2} ${tailX},${bY+bH/2+4}`;
    const tail = svgEl('polygon',{
      points:tailPts,
      fill:'rgba(19,19,28,0.92)',
      stroke:c, 'stroke-width':'1'
    });
    svg.appendChild(tail);

    // 색상 인디케이터 바

    });

    bar.setAttribute('x', isRight ? bX : bX + bW - 3);

    // 메모 텍스트
    const txt = svgEl('text',{

      'font-family':'Noto Sans KR,sans-serif',

    });

  });
}


// ════ 인라인 목록 + 메모 말풍선 ════
function drawInlineList(){
  const wrap = document.getElementById('inlineList');
  wrap.innerHTML = '';

  const local = schedules.filter(s=>{
    if(hiddenIds.has(String(s.id))) return false;
    if(s.repeat) return allSchedules().find(x=>x.id===s.id); // 반복은 allSchedules 결과 사용
    return (s.date||TODAY)===currentDate;
  }).sort((a,b)=>a.start.localeCompare(b.start));

  const notion = notionSchedules.filter(s=>{
    if(hiddenIds.has(String(s.id))) return false;
    return (s.date||currentDate)===currentDate;
  }).sort((a,b)=>a.start.localeCompare(b.start));

  const empty = !local.length && !notion.length && !dsNoTime.length;
  if(empty){
    wrap.innerHTML='<div class="empty-state">아직 일정이 없어요.<br>+ 버튼을 눌러 추가하거나<br>링 위를 드래그해서 추가하세요!</div>';
    return;
  }

  function makeSwipeItem(s, isNotion, isNoTime){
    // 바깥 래퍼 (삭제 배경 포함)
    const outer = document.createElement('div');
    outer.className = 'swipe-wrap';

    const delBg = document.createElement('div');
    delBg.className = 'swipe-del-bg';
    delBg.textContent = '🗑';

    // 아이템 본체
    const item = document.createElement('div');
    item.className = 'inline-item' + (isNotion?' github':'') + (isNoTime?' notime':'');

    const colorBar = document.createElement('div');
    colorBar.className = 'inline-item-color';
    colorBar.style.background = s.color || COLORS[0];

    const body = document.createElement('div');
    body.className = 'inline-item-body';

    const titleEl = document.createElement('div');
    titleEl.className = 'inline-item-title';
    titleEl.textContent = s.title;

    const timeEl = document.createElement('div');
    timeEl.className = 'inline-item-time';
    timeEl.textContent = isNoTime ? '시간 미지정' : `${s.start} ~ ${s.end} · ${durLabel(s.start,s.end)}`;

    const tags = document.createElement('div');
    tags.className = 'inline-item-tags';
    if(s.repeat) tags.innerHTML += `<span class="tag repeat">🔁 ${RMAP[s.repeat]}</span>`;
    if(isNotion) tags.innerHTML += `<span class="tag gh">📅 DS</span>`;
    if(isNoTime) tags.innerHTML += `<span class="tag" style="color:var(--t3);background:var(--b1)">시간미정</span>`;

    body.appendChild(titleEl);
    body.appendChild(timeEl);
    if(tags.innerHTML) body.appendChild(tags);

    // 수정 버튼
    const actions = document.createElement('div');
    actions.className = 'inline-item-actions';
    const editBtn = document.createElement('button');
    editBtn.className = 'inline-btn';
    editBtn.textContent = '✏️';
    editBtn.addEventListener('click', e=>{ e.stopPropagation(); isNoTime ? assignTime(s.id,s.title) : editSched(s.id); });
    actions.appendChild(editBtn);

    item.appendChild(colorBar);
    item.appendChild(body);
    item.appendChild(actions);

    outer.appendChild(delBg);
    outer.appendChild(item);

    // ── 스와이프 삭제 (왼쪽으로) ──
    let startX=0, startY=0, isDragging=false, isH=false;
    const THRESHOLD = 80;

    function onStart(clientX, clientY){
      startX=clientX; startY=clientY; isDragging=true; isH=false;
      item.style.transition='none';
    }
    function onMove(clientX, clientY){
      if(!isDragging) return;
      const dx=clientX-startX, dy=clientY-startY;
      if(!isH && Math.abs(dy)>Math.abs(dx)){ isDragging=false; return; }
      isH=true;
      if(dx>0) return; // 오른쪽은 무시
      const move=Math.max(dx,-THRESHOLD*1.5);
      item.style.transform=`translateX(${move}px)`;
      delBg.style.width=`${Math.min(-move,100)}px`;
    }
    function onEnd(clientX){
      if(!isDragging||!isH){ isDragging=false; return; }
      isDragging=false;
      item.style.transition='transform .18s cubic-bezier(.25,.46,.45,.94)';
      const dx=clientX-startX;
      if(dx < -THRESHOLD){
        item.style.transform=`translateX(-100%)`;
        delBg.style.width='100%';
        setTimeout(()=>{
          const sid = String(s.id);
          if(sid.startsWith('bk_')){
            // 예약 일정 → JSONbin schedules 에서 실제 삭제
            const realId = sid.slice(3); // 'bk_' 제거
            deleteBookingFromJsonbin(realId);
            showToast('예약을 삭제했어요');
          } else if(sid.startsWith('ds_') || sid.startsWith('ds_nt_') || sid.startsWith('bk_nt_')){
            // DailySchedule 일정 / 시간미정 → 오늘 목록에서만 숨기기
            hiddenIds.add(sid);
            saveHidden();
            showToast('오늘 목록에서 숨겼어요');
          } else {
            // circular 자체 일정 → 실제 삭제
            schedules = schedules.filter(x=>String(x.id)!==sid);
            saveLocal();
            showToast('삭제했어요');
          }
          drawClock(); drawInlineList();
        },200);
      } else {
        item.style.transform='translateX(0)';
        delBg.style.width='0';
      }
    }

    // 터치
    item.addEventListener('touchstart',e=>{
      onStart(e.touches[0].clientX, e.touches[0].clientY);
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      onMove(e.touches[0].clientX, e.touches[0].clientY);
      // 일정을 가로로 스와이프 중이면 시계영역 날짜넘김으로 전파 차단
      if(isH) e.stopPropagation();
    },{passive:true});
    item.addEventListener('touchend',e=>{
      if(isH) e.stopPropagation();
      onEnd(e.changedTouches[0].clientX);
    });

    // 마우스 (데스크탑)
    item.addEventListener('mousedown',e=>onStart(e.clientX, e.clientY));
    item.addEventListener('mousemove',e=>{ if(isDragging) onMove(e.clientX, e.clientY); });
    item.addEventListener('mouseup',e=>onEnd(e.clientX));
    item.addEventListener('mouseleave',e=>{ if(isDragging) onEnd(e.clientX); });

    return outer;
  }

  function renderSection(title, items, isNotion){
    if(!items.length) return;
    const hdr = document.createElement('div');
    hdr.className = 'inline-section-header';
    hdr.innerHTML = `${title} <span class="badge">${items.length}</span>`;
    wrap.appendChild(hdr);
    items.forEach(s=>wrap.appendChild(makeSwipeItem(s, isNotion, false)));
  }

  renderSection('내 일정', local, false);
  renderSection('📅 DailySchedule', notion, true);

  if(dsNoTime.filter(s=>!hiddenIds.has(String(s.id))).length){
    const filtered = dsNoTime.filter(s=>!hiddenIds.has(String(s.id)));
    const hdr=document.createElement('div');hdr.className='inline-section-header';
    hdr.innerHTML=`⏳ 시간미정 <span class="badge">${filtered.length}</span>`;
    wrap.appendChild(hdr);
    filtered.forEach(s=>wrap.appendChild(makeSwipeItem(s, false, true)));
  }
}

// timeZone → 시작/종료 시간 매핑 (DailySchedule과 동일)
const TZ_MAP = {
  0: null,           // 시간미정 → 표시 안 함
  1: ['06:00','09:00'],
  2: ['09:00','12:00'],
  3: ['12:00','15:00'],
  4: ['15:00','18:00'],
  5: ['18:00','21:00'],
  6: ['21:00','24:00'],
};
const TZ_COLORS = {
  1:'#ffd166', 2:'#ff9f43', 3:'#4ecdc4',
  4:'#7c6dfa', 5:'#ff6b9d', 6:'#a29bfe',
};

// 예약 일정(schedules)용: 기본 3시간 블록 시각 계산
// time 이 있으면 그 시각부터 3시간, 없으면 timeZone 으로 폴백
function bookingToStartEnd(s){
  if(s.time && /^\d{1,2}:\d{2}$/.test(s.time)){
    const [h,m] = s.time.split(':').map(Number);
    const startMin = h*60+m;
    const endMin = startMin + 180; // 기본 3시간
    const pad = n => String(n).padStart(2,'0');
    const fmt = mm => `${pad(Math.floor((mm%1440)/60))}:${pad(mm%60)}`;
    return [fmt(startMin), endMin>=1440 ? '24:00' : fmt(endMin)];
  }
  if(s.timeZone && TZ_MAP[s.timeZone]) return TZ_MAP[s.timeZone];
  return null; // 시간 정보 없음
}

function fetchSchedulesArray(){

// 예약 일정을 JSONbin schedules 에서 삭제
function deleteBookingFromJsonbin(realId){
  try{
    // GET
    const get = new XMLHttpRequest();
    get.open('GET', CIRC_JSONBIN_URL + '/latest', false);
    get.setRequestHeader('X-Master-Key', CIRC_JSONBIN_KEY);
    get.send();
    if(get.status !== 200) throw new Error('읽기 실패');
    const rec = JSON.parse(get.responseText).record || {};
    rec.schedules = (rec.schedules || []).filter(s => String(s.id) !== String(realId));
    // PUT
    const put = new XMLHttpRequest();
    put.open('PUT', CIRC_JSONBIN_URL, false);
    put.setRequestHeader('Content-Type', 'application/json');
    put.setRequestHeader('X-Master-Key', CIRC_JSONBIN_KEY);
    put.send(JSON.stringify(rec));
    // 캐시도 갱신
    localStorage.setItem('progress_v1', JSON.stringify(rec));
  }catch(e){
    showToast('삭제 실패: 네트워크 확인');
  }
}

function syncFromDailySchedule(){
  setSyncStatus('loading','동기화 중...');
  try{
    const today = currentDate;
    let dsCount = 0, bkCount = 0;
    notionSchedules = [];
    dsNoTime = [];

    // (1) DailySchedule 오늘탭 데이터 (dailySchedule_v4) — 기존 동작 유지
    const raw = localStorage.getItem('dailySchedule_v4');
    if(raw){
      const ds = JSON.parse(raw);
      const allItems = ds.data || [];
      const dayItems = allItems.filter(p => p.date === today);
      dsCount = dayItems.length;

      dayItems.forEach(p => {
        // fromTelegram 항목은 schedules 에서 다시 잡으므로 여기선 제외 (중복 방지)
        if(p.fromTelegram) return;
        if(p.timeZone && p.timeZone > 0){
          const [start, end] = TZ_MAP[p.timeZone];
          notionSchedules.push({ id:'ds_'+p.id, title:p.title, start, end,
            date: today,
            color:TZ_COLORS[p.timeZone]||COLORS[0], memo:'', repeat:null, _src:'ds' });
        } else {
          dsNoTime.push({ id:'ds_nt_'+p.id, title:p.title, _src:'ds_notime' });
        }
      });
    }

    // (2) 예약 일정 배열 (schedules) — JSONbin 직접 읽기 (미래 날짜 포함)
    const schedArr = fetchSchedulesArray();
    schedArr
      .filter(s => s && s.title && s.date === today)
      .forEach(s => {
        const se = bookingToStartEnd(s);  // 기본 3시간 블록
        if(se){
          notionSchedules.push({
            id:'bk_'+s.id, title:s.title, start:se[0], end:se[1],
            date: today,
            color: '#E67E22',  // 예약은 주황색으로 구분
            memo: s.time ? '' : '시간 추정', repeat:null, _src:'booking'
          });
          bkCount++;
        } else {
          dsNoTime.push({ id:'bk_nt_'+s.id, title:s.title, _src:'booking_notime' });
        }
      });

    const now = new Date();
    const hm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    showToast(`일정 ${dsCount}개 · 예약 ${bkCount}개`);
    setSyncStatus('ok', `${notionSchedules.length + dsNoTime.length}개 · ${hm}`);
    drawClock(); drawInlineList();
  } catch(err) {
    setSyncStatus('err','오류');
    showToast('오류: ' + err.message);
  }
}

// ════ 날짜 네비게이션 ════
const DAYS_KO = ['일','월','화','수','목','금','토'];
const MAX_FUTURE = 7;

function addDays(dateStr, n){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toLocaleDateString('sv-SE');
}
function diffDays(a, b){
  return Math.round((new Date(a)-new Date(b))/(1000*60*60*24));
}
function formatDateNav(dateStr){
  const d = new Date(dateStr);
  const diff = diffDays(dateStr, TODAY);
  const label = diff===0?'오늘':diff===1?'내일':diff===-1?'어제':`${Math.abs(diff)}일${diff>0?'후':'전'}`;
  return {
    main: `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KO[d.getDay()]})`,
    sub: label
  };
}

function setCurrentDate(dateStr, dir='none'){
  // 범위 제한: 오늘 -30일 ~ +7일
  const minDate = addDays(TODAY, -30);
  const maxDate = addDays(TODAY, MAX_FUTURE);
  if(dateStr < minDate || dateStr > maxDate) return;

  currentDate = dateStr;
  hiddenIds = getHidden(currentDate);
  updateDateNav();
  animateClock(dir);
}

function updateDateNav(){
  const {main, sub} = formatDateNav(currentDate);
  document.getElementById('dateNavMain').textContent = main;
  document.getElementById('dateNavSub').textContent = sub;
  // 헤더 날짜 업데이트
  document.getElementById('hdate').textContent = formatDateNav(currentDate).main;
  // 도트 업데이트
  renderDateDots();
  // DailySchedule + 예약(schedules) 동기화 — 모든 날짜에서 동작
  syncFromDailySchedule();
}

function renderDateDots(){
  const dots = document.getElementById('dateDots');
  dots.innerHTML = '';
  for(let i=0; i<=MAX_FUTURE; i++){
    const d = addDays(TODAY, i);
    const dot = document.createElement('div');
    dot.className = 'date-dot'
      + (d===TODAY?' today':'')
      + (d===currentDate?' active':'')
      + (hasSchedules(d)?' has':'');
    dot.title = d;
    dot.addEventListener('click',()=>setCurrentDate(d, d>currentDate?'left':'right'));
    dots.appendChild(dot);
  }
}

function hasSchedules(dateStr){
  // (1) circular 자체 일정
  const hasLocal = schedules.some(s=>{
    if(s.repeat) return true;
    return (s.date||TODAY)===dateStr;
  });
  if(hasLocal) return true;
  // (2) 예약 일정 (progress_v1 캐시) — 해당 날짜에 예약 있으면 점 표시
  try{
    const prog = localStorage.getItem('progress_v1');
    if(prog){
      const arr = (JSON.parse(prog).schedules) || [];
      if(arr.some(s => s && s.date === dateStr)) return true;
    }
  }catch(e){}
  return false;
}

// 시계 애니메이션 (슬라이드)
function animateClock(dir){
  const sticky = document.getElementById('clockSticky');
  if(dir==='none'){ drawClock(); drawInlineList(); return; }
  // 퇴장
  sticky.classList.add(dir==='left'?'out-left':'out-right');
  setTimeout(()=>{
    sticky.classList.remove('out-left','out-right');
    sticky.classList.add(dir==='left'?'in-right':'in-left');
    drawClock(); drawInlineList();
    // 강제 리플로우
    sticky.offsetHeight;
    sticky.classList.remove('in-left','in-right');
  }, 200);
}

// 버튼
document.getElementById('btnPrevDay').addEventListener('click',()=>setCurrentDate(addDays(currentDate,-1),'right'));
document.getElementById('btnNextDay').addEventListener('click',()=>setCurrentDate(addDays(currentDate,1),'left'));
document.getElementById('btnToday').addEventListener('click',()=>{
  if(currentDate!==TODAY) setCurrentDate(TODAY, TODAY>currentDate?'left':'right');
});

// ── 시계 영역 수평 스와이프로 날짜 이동 ──
let clockSwipe = null;
const clockArea = document.getElementById('vClock');

clockArea.addEventListener('touchstart', e=>{
  const t = e.touches[0];
  // 일정 목록 영역에서 시작한 터치는 날짜 스와이프로 처리하지 않음
  // (일정 항목 자체의 좌우 스와이프 삭제와 충돌 방지)
  const listEl = document.getElementById('inlineList');
  if(listEl){
    const lr = listEl.getBoundingClientRect();
    if(t.clientY >= lr.top && t.clientY <= lr.bottom &&
       t.clientX >= lr.left && t.clientX <= lr.right){
      clockSwipe = null;
      return;
    }
  }
  // 시계 링 위 드래그와 구분: 링 내부면 무시
  const svg = document.getElementById('clockSvg');
  const rect = svg.getBoundingClientRect();
  const scaleX = 400/rect.width, scaleY = 400/rect.height;
  const x = (t.clientX-rect.left)*scaleX - CX;
  const y = (t.clientY-rect.top)*scaleY - CY;
  const dist = Math.sqrt(x*x+y*y);
  // 링 영역(RI~R)이면 일정 드래그로 처리, 그 외면 날짜 스와이프
  if(dist >= RI-10 && dist <= R+20) return;
  clockSwipe = {startX: t.clientX, startY: t.clientY};
},{passive:true});

clockArea.addEventListener('touchend', e=>{
  if(!clockSwipe) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - clockSwipe.startX;
  const dy = t.clientY - clockSwipe.startY;
  clockSwipe = null;
  if(Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)*0.7) return;
  if(dx < 0) setCurrentDate(addDays(currentDate,1),'left');
  else setCurrentDate(addDays(currentDate,-1),'right');
},{passive:true});

// ════ 사용법 팝업 ════
document.getElementById('btnHelp').addEventListener('click',()=>document.getElementById('helpOverlay').classList.add('on'));
document.getElementById('btnHelpClose').addEventListener('click',()=>document.getElementById('helpOverlay').classList.remove('on'));
document.getElementById('helpOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('helpOverlay').classList.remove('on');});

// ════ 토스트 ════
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2400);
}

// ════ 날짜 표시 ════
// 날짜는 updateDateNav()에서 처리

// ════ 드래그로 일정 추가 (터치 + 마우스 통합) ════
const svgEl2=document.getElementById('clockSvg');

// SVG 내부 좌표(0~400) 기준 각도 + 거리 반환
function getAngleFromEvent(e){
  const rect=svgEl2.getBoundingClientRect();
  const src=(e.touches&&e.touches.length>0)?e.touches[0]
           :(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]
           :e;
  // 화면 px → SVG 내부 400×400 좌표계로 변환
  const scaleX=400/rect.width, scaleY=400/rect.height;
  const x=(src.clientX-rect.left)*scaleX-CX;
  const y=(src.clientY-rect.top)*scaleY-CY;
  const dist=Math.sqrt(x*x+y*y);
  const angle=Math.atan2(y,x)*180/Math.PI;
  return{angle,dist};
}

// dist는 SVG 내부 좌표(0~400) 기준이므로 RI/R과 직접 비교 가능
function isRingZone(dist){return dist>=(RI-10)&&dist<=(R+20);}

function removeDragPreview(){
  if(dragState&&dragState.previewEl){
    dragState.previewEl.remove();
    dragState.previewEl=null;
  }
}

function makeDragArc(aS,aE){
  // 항상 document.createElementNS 사용 (SVG 요소에는 없음)
  const p=document.createElementNS(NS,'path');
  let sweep=aE-aS; if(sweep<=0)sweep+=360;
  p.setAttribute('d',arcOnlyPath(aS,aE));
  p.setAttribute('fill','none');
  p.setAttribute('stroke','rgba(255,255,255,0.55)');
  p.setAttribute('stroke-width','6');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-dasharray','8 5');
  // 터치에서 잘 보이도록 외곽에 글로우 효과
  p.setAttribute('filter','drop-shadow(0 0 3px rgba(255,255,255,0.6))');
  return p;
}

// 터치 이벤트
svgEl2.addEventListener('touchstart',e=>{
  const{angle,dist}=getAngleFromEvent(e);
  if(!isRingZone(dist))return;
  e.preventDefault();
  dragState={startAngle:angle,previewEl:null};
},{passive:false});

svgEl2.addEventListener('touchmove',e=>{
  if(!dragState)return;
  e.preventDefault();
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  const p=makeDragArc(dragState.startAngle,angle);
  svgEl2.appendChild(p);
  dragState.previewEl=p;

  // 현재 시간 힌트 표시
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  document.getElementById('nowTime').textContent=`${tS}~${tE}`;
},{passive:false});

svgEl2.addEventListener('touchend',e=>{
  if(!dragState)return;
  e.preventDefault();
  removeDragPreview();
  // 시각 복원
  const now=new Date();
  document.getElementById('nowTime').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const{angle}=getAngleFromEvent(e);
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  dragState=null;
  if(tS!==tE){
    openSheet(null,tS,tE);
  }else{
    showToast('조금 더 드래그해보세요');
  }
},{passive:false});

svgEl2.addEventListener('touchcancel',()=>{
  removeDragPreview();
  dragState=null;
  const now=new Date();
  document.getElementById('nowTime').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
});

// 마우스 이벤트 (데스크탑)
svgEl2.addEventListener('mousedown',e=>{
  const{angle,dist}=getAngleFromEvent(e);
  if(!isRingZone(dist))return;
  dragState={startAngle:angle,previewEl:null};
});
svgEl2.addEventListener('mousemove',e=>{
  if(!dragState)return;
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  let aS=dragState.startAngle, aE=angle;
  if(aE<aS)aE+=360;
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',arcOnlyPath(aS,aE));
  p.setAttribute('fill','none');
  p.setAttribute('stroke','rgba(255,255,255,0.4)');
  p.setAttribute('stroke-width','5');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-dasharray','7 4');
  svgEl2.appendChild(p);
  dragState.previewEl=p;
});
svgEl2.addEventListener('mouseup',e=>{
  if(!dragState)return;
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  dragState=null;
  if(tS!==tE)openSheet(null,tS,tE);
});
svgEl2.addEventListener('mouseleave',()=>{removeDragPreview();dragState=null;});

// ════ 초기 실행 ════
updateDateNav(); // 날짜 네비 + drawClock + syncFromDailySchedule 포함
setInterval(()=>{ if(currentDate===TODAY) drawClock(); }, 30000);

// 다른 기기에서 만든 자체 일정 자동 수신 (앱 열 때 + 다른 앱 보다 돌아올 때)
pullRoutinesFromJsonbin();
document.addEventListener('visibilitychange', () => {
  if(!document.hidden) pullRoutinesFromJsonbin();
});
</script>
