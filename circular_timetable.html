<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원형 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c12;--s1:#13131c;--s2:#1a1a26;--s3:#222230;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.22);
  --t1:#eeeef8;--t2:#8888a8;--t3:#4a4a68;
  --acc:#7c6dfa;--acc2:#a89cfc;
  --clock-inner:#ffffff;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;height:100dvh;-webkit-tap-highlight-color:transparent;}

/* ── 헤더 ── */
header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;gap:8px;}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;}
.logo em{color:var(--acc2);font-style:normal;}
.hdate{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);flex:1;text-align:center;}
.header-right{display:flex;gap:6px;align-items:center;}
.btn-icon{width:32px;height:32px;border:1px solid var(--b2);background:var(--s2);border-radius:9px;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-icon:active{background:var(--s3);}
.btn-add{width:34px;height:34px;background:var(--acc);border:none;border-radius:10px;color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .1s;flex-shrink:0;}
.btn-add:active{transform:scale(.92);opacity:.85;}

/* ── 탭 ── */
.view-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;}
.vtab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;color:var(--t3);text-align:center;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:'Noto Sans KR',sans-serif;}
.vtab.on{color:var(--acc2);border-bottom-color:var(--acc2);}

main{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;}
.view.on{display:block;}

/* ── 시계 뷰 ── */
.clock-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 12px 20px;}
.clock-outer{position:relative;width:min(88vw,370px);height:min(88vw,370px);flex-shrink:0;}
#clockSvg{width:100%;height:100%;display:block;touch-action:none;}
.clock-center-info{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:110px;}
.clock-time{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:#1a1a2e;line-height:1.1;}
.clock-sub{font-size:10px;color:#9090b0;margin-top:2px;}
.drag-hint{font-size:11px;color:var(--t3);margin-top:8px;text-align:center;}

.legend{display:flex;flex-wrap:wrap;gap:5px 10px;justify-content:center;margin-top:12px;padding:0 8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── GitHub 동기화 패널 ── */
.sync-bar{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:9px 12px;margin:0 12px 10px;}
.sync-bar input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;min-width:0;}
.sync-bar input::placeholder{color:var(--t3);}
.sync-status{font-size:10px;white-space:nowrap;padding:2px 8px;border-radius:5px;}
.sync-status.ok{color:#4ecdc4;background:rgba(78,205,196,.12);}
.sync-status.err{color:#ff6b6b;background:rgba(255,107,107,.12);}
.sync-status.loading{color:var(--t2);background:var(--b1);}
.btn-sync{padding:5px 10px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--acc2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.btn-sync:active{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ── 목록 뷰 ── */
.list-wrap{padding:10px 12px;}
.list-section-header{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:8px 2px 5px;display:flex;align-items:center;gap:6px;}
.list-section-header .badge{background:var(--s3);border:1px solid var(--b2);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--t2);}
.sched-item{display:flex;align-items:stretch;gap:9px;background:var(--s2);border-radius:10px;padding:10px 11px;margin-bottom:5px;border:1px solid var(--b1);transition:background .15s;}
.sched-item:active{background:var(--s3);}
.sched-item.github{border-left:2px solid #4ecdc4;}
.sched-color-bar{width:3px;border-radius:2px;flex-shrink:0;}
.sched-body{flex:1;min-width:0;}
.sched-title{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.sched-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);}
.sched-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;}
.tag.repeat{color:var(--acc2);background:rgba(124,109,250,.14);}
.tag.gh{color:#4ecdc4;background:rgba(78,205,196,.12);}
.sched-memo{font-size:11px;color:var(--t3);margin-top:2px;}
.sched-actions{display:flex;align-items:center;gap:4px;}
.sched-btn{width:27px;height:27px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sched-btn:active{background:var(--b2);}
.sched-btn.del{color:#ff6b6b;}
.empty-state{text-align:center;padding:44px 20px;color:var(--t3);font-size:13px;line-height:2;}

/* ── 바텀 시트 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(3px);}
.overlay.on{display:flex;}
.sheet{width:100%;max-height:93dvh;background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--b2);border-bottom:none;overflow-y:auto;padding-bottom:max(env(safe-area-inset-bottom,0px),24px);animation:slideUp .25s cubic-bezier(.32,1.1,.6,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--b3);margin:12px auto 0;}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 12px;border-bottom:1px solid var(--b1);}
.sheet-title{font-size:15px;font-weight:700;}
.btn-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:15px 18px;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11px;font-weight:500;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fi,.fta,.fsel{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.fi:focus,.fta:focus,.fsel:focus{border-color:var(--acc);}
.fi{font-family:'DM Mono',monospace;}
.fta{resize:none;height:60px;line-height:1.5;}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{padding:6px 9px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s;}
.qbtn:active{background:var(--acc);color:#fff;border-color:var(--acc);}
.color-row{display:flex;gap:7px;flex-wrap:wrap;}
.color-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .1s;}
.color-opt:active{transform:scale(.88);}
.color-opt.on{border-color:#fff;transform:scale(1.08);}
.check-row{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:10px;padding:11px 12px;}
.check-label{font-size:13px;flex:1;}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--s3);border:1px solid var(--b2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--acc);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}
.repeat-opts{display:none;margin-top:7px;background:var(--s2);border-radius:10px;padding:9px 12px;gap:6px;flex-wrap:wrap;}
.repeat-opts.on{display:flex;}
.repbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s;}
.repbtn.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-save{width:100%;padding:13px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Noto Sans KR',sans-serif;transition:opacity .1s,transform .1s;}
.btn-save:active{opacity:.85;transform:scale(.98);}

/* ── GitHub 설정 시트 ── */
.gh-info{background:var(--s2);border-radius:10px;padding:11px 13px;margin-bottom:12px;font-size:12px;color:var(--t2);line-height:1.7;}
.gh-info code{color:var(--acc2);font-family:'DM Mono',monospace;font-size:11px;}
.gh-url-row{display:flex;gap:7px;align-items:flex-start;}
.gh-url-row .fi{flex:1;}
.btn-gh-save{padding:10px 14px;border-radius:10px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

/* ── 드래그 미리보기 ── */
.drag-arc{pointer-events:none;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-size:13px;padding:8px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="logo">원형 <em>시간표</em></div>
  <div class="hdate" id="hdate"></div>
  <div class="header-right">
    <button class="btn-icon" id="btnNotionSettings" title="노션 동기화">🔄</button>
    <button class="btn-add" id="btnAdd" aria-label="일정 추가">+</button>
  </div>
</header>

<nav class="view-tabs">
  <button class="vtab on" data-v="Clock">🕐 시계</button>
  <button class="vtab" data-v="List">📋 목록</button>
</nav>

<main>
  <!-- 시계 뷰 -->
  <div class="view on" id="vClock">
    <div class="clock-wrap">
      <!-- DailySchedule 동기화 상태 바 -->
      <div class="sync-bar" id="syncBar">
        <span style="font-size:13px;">📅</span>
        <span class="sync-status loading" id="syncStatus">동기화 중...</span>
      </div>
      <div class="clock-outer">
        <svg id="clockSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="clock-center-info">
          <div class="clock-time" id="nowTime">--:--</div>
          <div class="clock-sub">현재 시각</div>
        </div>
      </div>
      <div class="drag-hint">💡 링 위를 드래그해서 일정 추가</div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- 목록 뷰 -->
  <div class="view" id="vList">
    <div class="list-wrap" id="listWrap"></div>
  </div>
</main>

<!-- 일정 추가/수정 시트 -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">일정 추가</div>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="fl" for="inTitle">일정 이름</label>
        <input class="fi" id="inTitle" type="text" placeholder="예: 아침 루틴, 업무, 점심..." maxlength="30" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl" for="inMemo">메모 (선택)</label>
        <textarea class="fta" id="inMemo" placeholder="추가 내용..."></textarea>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl" for="inStart">시작 시간</label>
          <input class="fi" id="inStart" type="time" step="1800">
        </div>
        <div class="fg">
          <label class="fl" for="inEnd">종료 시간</label>
          <input class="fi" id="inEnd" type="time" step="1800">
        </div>
      </div>
      <div class="fg">
        <label class="fl">빠른 시간 설정</label>
        <div class="quick-row">
          <button class="qbtn" data-min="30">+30분</button>
          <button class="qbtn" data-min="60">+1시간</button>
          <button class="qbtn" data-min="90">+1.5h</button>
          <button class="qbtn" data-min="120">+2시간</button>
          <button class="qbtn" data-min="180">+3시간</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">블록 색상</label>
        <div class="color-row" id="colorRow"></div>
      </div>
      <div class="fg">
        <div class="check-row">
          <span class="check-label">반복 일정</span>
          <div class="toggle" id="toggleRepeat"></div>
        </div>
        <div class="repeat-opts" id="repeatOpts">
          <button class="repbtn on" data-rep="daily">매일</button>
          <button class="repbtn" data-rep="weekday">평일</button>
          <button class="repbtn" data-rep="weekend">주말</button>
          <button class="repbtn" data-rep="weekly">매주</button>
        </div>
      </div>
      <button class="btn-save" id="btnSave">저장</button>
    </div>
  </div>
</div>

<!-- (노션 설정 시트 제거됨 - DailySchedule localStorage 직접 읽기) -->

<div class="toast" id="toast"></div>

<script>
// ════ 상수 & 상태 ════
const COLORS=['#7c6dfa','#ff6b9d','#ffd166','#4ecdc4','#ff9f43','#a29bfe','#70e1f5','#ff6b6b'];
const RMAP={daily:'매일',weekday:'평일',weekend:'주말',weekly:'매주'};
const NS='http://www.w3.org/2000/svg';
const CX=200,CY=200,R=178,RI=92; // RI = 내부 원 반지름 (흰색)

let schedules = JSON.parse(localStorage.getItem('circ_local')||'[]');
let notionSchedules = [];
let dsNoTime = []; // 시간미정 항목
let editId=null, selColor=COLORS[0], selRepeat='daily', repeatOn=false;

// ════ DailySchedule 동기화 설정 ════
// localStorage 키: 'dailySchedule_v4' (DailySchedule 앱과 동일)

// 드래그 상태
let dragState=null; // {startAngle, previewEl}

// ════ 유틸 ════
function saveLocal(){localStorage.setItem('circ_local',JSON.stringify(schedules));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function timeToMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minsToTime(m){const mm=((m%1440)+1440)%1440;return `${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function durLabel(s,e){let d=timeToMins(e)-timeToMins(s);if(d<=0)d+=1440;const h=Math.floor(d/60),m=d%60;return h?(m?`${h}시간 ${m}분`:`${h}시간`):`${m}분`;}

// ════ SVG 헬퍼 ════
function svgEl(tag,a){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
function pol(r,deg){const rad=deg*Math.PI/180;return[CX+r*Math.cos(rad),CY+r*Math.sin(rad)];}
function timeToAngle(t){const[h,m]=t.split(':').map(Number);return((h+m/60)/24)*360-90;}
function angleToSnap(deg){
  let d=((deg+90)+3600)%360;
  let total=(d/360)*24*60;
  let snapped=Math.round(total/30)*30;
  return minsToTime(snapped);
}

function hexRgba(hex,a){
  if(!hex||hex.length<7)return`rgba(124,109,250,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function wedgePath(aS,aE){
  let sweep=aE-aS; if(sweep<=0)sweep+=360; if(sweep>359.9)sweep=359.9;
  const s=pol(R,aS),e=pol(R,aS+sweep);
  const large=sweep>180?1:0;
  return`M${CX},${CY} L${s[0]},${s[1]} A${R},${R} 0 ${large},1 ${e[0]},${e[1]} Z`;
}
function arcOnlyPath(aS,aE){
  let sweep=aE-aS; if(sweep<=0)sweep+=360; if(sweep>359.9)sweep=359.9;
  const s=pol(R,aS),e=pol(R,aS+sweep);
  const large=sweep>180?1:0;
  return`M${s[0]},${s[1]} A${R},${R} 0 ${large},1 ${e[0]},${e[1]}`;
}

// ════ 병합된 일정 목록 ════
function allSchedules(){
  return [...schedules, ...notionSchedules];
}

// ════ 키워드 → 캐릭터 매핑 ════
function detectCharType(title){
  const t=title.toLowerCase();
  if(/수면|취침|잠|기상|sleep|자기/.test(t))   return 'sleep';
  if(/러닝|달리기|조깅|running|run/.test(t))    return 'run';
  if(/팔굽|푸시업|push|복근|근력|헬스|gym|fitness|불가리안|아령|운동/.test(t)) return 'workout';
  if(/에어컨|청소|업무|work|cleaning|클리닝|이룸|파란|빛나라/.test(t)) return 'work';
  if(/기타|guitar|연주|밴드/.test(t))           return 'guitar';
  if(/아침|점심|저녁|식사|밥|국수|라면|pasta|lunch|dinner|breakfast|먹/.test(t)) return 'meal';
  if(/독서|책|읽|book|read/.test(t))            return 'read';
  if(/공부|스터디|study|학습|수업|강의|lesson/.test(t)) return 'study';
  return null;
}

// SVG 캐릭터 그리기 (cx,cy = 중심, size = 크기)
function drawCharacter(svg, type, cx, cy, size){
  const s = size;
  const g = svgEl('g', {transform:`translate(${cx},${cy})`});

  // 공통 애니메이션 ID (중복 방지)
  const uid = Math.random().toString(36).slice(2,6);

  if(type==='sleep'){
    // 초승달
    const moon = svgEl('path',{d:`M${s*.4} ${-s*.6} Q${s*.1} ${-s*.2} ${s*.1} ${s*.2} Q${s*.1} ${s*.6} ${s*.4} ${s*.6} Q${-s*.5} ${s*.6} ${-s*.6} ${s*.1} Q${-s*.7} ${-s*.3} ${-s*.1} ${-s*.5} Z`, fill:'#FFCC00'});
    g.appendChild(moon);

    [note,pen,penTip,head,eye1,eye2,brow1,brow2,mouth,arm1,arm2,bulb,bulbBase].forEach(x=>g.appendChild(x));
  }

  svg.appendChild(g);
}


function drawClock(){
  const svg=document.getElementById('clockSvg');
  svg.innerHTML='';

  // ① 배경 원 (다크)
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R,fill:'#13131c',stroke:'rgba(255,255,255,0.05)','stroke-width':'1'}));

  // ② 일정 블록
  allSchedules().forEach(s=>{
    const aS=timeToAngle(s.start);
    const aE=timeToAngle(s.end);
    const c=s.color||COLORS[0];

    svg.appendChild(svgEl('path',{d:wedgePath(aS,aE),fill:hexRgba(c,0.22)}));
    svg.appendChild(svgEl('path',{d:arcOnlyPath(aS,aE),fill:'none',stroke:c,'stroke-width':'3.5','stroke-linecap':'round'}));

    let sweep=aE-aS; if(sweep<=0)sweep+=360;
    const mid=aS+sweep/2;
    const charType=detectCharType(s.title);
    const ringMid=(R+RI)/2;

    if(charType && sweep>=30){
      // 캐릭터 크기: 블록 각도에 따라 조절
      const charSize = Math.min(sweep/360 * R * 1.1, 28);
      const lp=pol(ringMid, mid);
      drawCharacter(svg, charType, lp[0], lp[1], charSize);
    } else if(sweep>=12){
      // 캐릭터 없으면 텍스트 라벨
      const lr=pol(ringMid, mid);
      const lbl=svgEl('text',{x:lr[0],y:lr[1],fill:c,'font-size':'10','text-anchor':'middle','dominant-baseline':'middle','font-family':'Noto Sans KR,sans-serif','font-weight':'500'});
      lbl.textContent=s.title.length>5?s.title.slice(0,4)+'…':s.title;
      svg.appendChild(lbl);
    }
  });

  // ③ 내부 흰 원 (clock face)
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:RI,fill:'#ffffff',stroke:'rgba(0,0,0,0.06)','stroke-width':'1'}));

  // ④ 눈금 & 숫자
  for(let h=0;h<24;h++){
    const a=(h/24)*360-90;
    const oR=R-1, iR_h=R-13, iR_30=R-8;
    const o=pol(oR,a), i=pol(iR_h,a);
    svg.appendChild(svgEl('line',{x1:o[0],y1:o[1],x2:i[0],y2:i[1],stroke:'rgba(255,255,255,0.25)','stroke-width':'1.5','stroke-linecap':'round'}));
    // 30분
    const a2=((h+.5)/24)*360-90;
    const o2=pol(oR,a2),i2=pol(iR_30,a2);
    svg.appendChild(svgEl('line',{x1:o2[0],y1:o2[1],x2:i2[0],y2:i2[1],stroke:'rgba(255,255,255,0.1)','stroke-width':'1','stroke-linecap':'round'}));
    // 숫자 (내부 원 바깥쪽 링 영역)
    const np=pol(R-22,a);
    const big=h%6===0;
    const num=svgEl('text',{x:np[0],y:np[1],fill:big?'rgba(255,255,255,.75)':'rgba(255,255,255,.3)','font-size':big?'11':'9','font-weight':big?'500':'400','text-anchor':'middle','dominant-baseline':'middle','font-family':'DM Mono,monospace'});
    num.textContent=String(h).padStart(2,'0');
    svg.appendChild(num);
  }

  // ⑤ 외곽 링
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R,fill:'none',stroke:'rgba(255,255,255,0.07)','stroke-width':'1.5'}));

  // ⑥ 현재 시각 바늘 (흰 내부 원 위에 그려짐 → 빨간색)
  const now=new Date();
  const na=((now.getHours()+now.getMinutes()/60)/24)*360-90;
  const np=pol(R-4,na);
  // 바늘 그림자
  svg.appendChild(svgEl('line',{x1:CX,y1:CY,x2:np[0],y2:np[1],stroke:'rgba(0,0,0,.15)','stroke-width':'5','stroke-linecap':'round'}));
  svg.appendChild(svgEl('line',{x1:CX,y1:CY,x2:np[0],y2:np[1],stroke:'#ff4444','stroke-width':'2.5','stroke-linecap':'round'}));
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:'5',fill:'#ff4444'}));

  // 현재 시각 텍스트
  const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('nowTime').textContent=`${hh}:${mm}`;

  drawLegend();
}

function drawLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  allSchedules().forEach(s=>{
    const item=document.createElement('div');item.className='legend-item';
    item.innerHTML=`<div class="legend-dot" style="background:${s.color||COLORS[0]}"></div><span>${escHtml(s.title)}</span>`;
    leg.appendChild(item);
  });
}

// ════ 목록 그리기 ════
function drawList(){
  const wrap=document.getElementById('listWrap');wrap.innerHTML='';
  const local=[...schedules].sort((a,b)=>a.start.localeCompare(b.start));
  const notion=[...notionSchedules].sort((a,b)=>a.start.localeCompare(b.start));

  function makeItem(s, isNotion){
    const div=document.createElement('div');
    div.className='sched-item'+(isNotion?' github':'');

    const bar=document.createElement('div');
    bar.className='sched-color-bar';
    bar.style.background=s.color||COLORS[0];

    const body=document.createElement('div');
    body.className='sched-body';
    body.innerHTML=`
      <div class="sched-title">${escHtml(s.title)}</div>
      <div class="sched-time">${s.start} ~ ${s.end} · ${durLabel(s.start,s.end)}</div>
      <div class="sched-tags">
        ${s.repeat?`<span class="tag repeat">🔁 ${RMAP[s.repeat]}</span>`:''}
        ${isNotion?'<span class="tag gh">📅 DS</span>':''}
      </div>
      ${s.memo?`<div class="sched-memo">${escHtml(s.memo)}</div>`:''}`;

    const actions=document.createElement('div');
    actions.className='sched-actions';

    // 수정 버튼
    const editBtn=document.createElement('button');
    editBtn.className='sched-btn';
    editBtn.textContent='✏️';
    editBtn.addEventListener('click',()=>editSched(s.id));
    actions.appendChild(editBtn);

    // 삭제 버튼 (내 일정만)
    if(!isNotion){
      const delBtn=document.createElement('button');
      delBtn.className='sched-btn del';
      delBtn.textContent='🗑';
      delBtn.addEventListener('click',()=>deleteSched(s.id));
      actions.appendChild(delBtn);
    }

    div.appendChild(bar);
    div.appendChild(body);
    div.appendChild(actions);
    return div;
  }

  function renderSection(title,items,isNotion){
    if(!items.length)return;
    const hdr=document.createElement('div');hdr.className='list-section-header';
    hdr.innerHTML=`${title} <span class="badge">${items.length}</span>`;
    wrap.appendChild(hdr);
    items.forEach(s=>wrap.appendChild(makeItem(s,isNotion)));
  }

  if(!local.length&&!notion.length&&!dsNoTime.length){
    wrap.innerHTML='<div class="empty-state">아직 일정이 없어요.<br>+ 버튼을 눌러 추가하거나<br>DailySchedule을 동기화해보세요!</div>';
    return;
  }
  renderSection('내 일정', local, false);
  renderSection('📅 DailySchedule (시간 지정)', notion, true);

  // 시간미정 항목
  if(dsNoTime.length){
    const hdr=document.createElement('div');hdr.className='list-section-header';
    hdr.innerHTML=`⏳ 시간미정 <span class="badge">${dsNoTime.length}</span>`;
    wrap.appendChild(hdr);
    dsNoTime.forEach(s=>{
      const div=document.createElement('div');
      div.className='sched-item';

      const bar=document.createElement('div');
      bar.className='sched-color-bar';
      bar.style.background='var(--t3)';

      const body=document.createElement('div');
      body.className='sched-body';
      body.innerHTML=`
        <div class="sched-title">${escHtml(s.title)}</div>
        <div class="sched-time" style="color:var(--t3)">시간 미지정</div>`;

      const actions=document.createElement('div');
      actions.className='sched-actions';

      const timeBtn=document.createElement('button');
      timeBtn.className='sched-btn';
      timeBtn.textContent='⏰';
      timeBtn.addEventListener('click',()=>assignTime(s.id, s.title));
      actions.appendChild(timeBtn);

      div.appendChild(bar);
      div.appendChild(body);
      div.appendChild(actions);
      wrap.appendChild(div);
    });
  }
}

// ════ 색상 팔레트 ════
function buildColorRow(){
  const row=document.getElementById('colorRow');row.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(c===selColor?' on':'');
    d.style.background=c;
    d.addEventListener('click',()=>{selColor=c;document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('on'));d.classList.add('on');});
    row.appendChild(d);
  });
}

// ════ 일정 시트 ════
function openSheet(id=null,startTime='',endTime=''){
  editId = id ? String(id) : null;
  const s = editId ? schedules.find(x=>String(x.id)===editId) : null;
  document.getElementById('sheetTitle').textContent = editId ? '일정 수정' : '일정 추가';
  document.getElementById('inTitle').value  = s?.title  || '';
  document.getElementById('inMemo').value   = s?.memo   || '';
  document.getElementById('inStart').value  = s?.start  || startTime;
  document.getElementById('inEnd').value    = s?.end    || endTime;
  selColor  = s?.color  || COLORS[schedules.length % COLORS.length];
  repeatOn  = !!(s?.repeat);
  selRepeat = s?.repeat || 'daily';
  document.getElementById('toggleRepeat').classList.toggle('on', repeatOn);
  document.getElementById('repeatOpts').classList.toggle('on', repeatOn);
  document.querySelectorAll('.repbtn').forEach(b=>b.classList.toggle('on', b.dataset.rep===selRepeat));
  buildColorRow();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('inTitle').focus(), 350);
}
function closeSheet(){document.getElementById('overlay').classList.remove('on');}

document.getElementById('btnAdd').addEventListener('click',()=>openSheet());
document.getElementById('btnClose').addEventListener('click',closeSheet);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet();});

document.getElementById('toggleRepeat').addEventListener('click',function(){
  repeatOn=!repeatOn;this.classList.toggle('on',repeatOn);
  document.getElementById('repeatOpts').classList.toggle('on',repeatOn);
});
document.querySelectorAll('.repbtn').forEach(b=>b.addEventListener('click',function(){
  selRepeat=this.dataset.rep;
  document.querySelectorAll('.repbtn').forEach(x=>x.classList.remove('on'));this.classList.add('on');
}));
document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click',()=>{
  const s=document.getElementById('inStart').value;
  if(!s){showToast('시작 시간을 먼저 입력하세요');return;}
  document.getElementById('inEnd').value=minsToTime(timeToMins(s)+parseInt(b.dataset.min));
}));

document.getElementById('btnSave').addEventListener('click',()=>{
  const title = document.getElementById('inTitle').value.trim();
  const start = document.getElementById('inStart').value;
  const end   = document.getElementById('inEnd').value;
  if(!title){showToast('일정 이름을 입력하세요');return;}
  if(!start||!end){showToast('시작/종료 시간을 입력하세요');return;}
  if(start===end){showToast('시작과 종료 시간이 같아요');return;}
  const obj = {
    id: editId || uid(),
    title, memo: document.getElementById('inMemo').value.trim(),
    start, end, color: selColor,
    repeat: repeatOn ? selRepeat : null
  };
  if(editId){
    const i = schedules.findIndex(x=>String(x.id)===editId);
    if(i>-1) schedules[i]=obj;
    else schedules.push(obj);
  } else {
    schedules.push(obj);
  }
  saveLocal(); closeSheet(); drawClock(); drawList();
  showToast(editId ? '수정했어요 ✓' : '추가했어요 ✓');
});

function editSched(id){
  const sid = String(id);
  const local = schedules.find(x=>String(x.id)===sid);
  if(local){ openSheet(local.id); return; }
  // DS 일정이면 로컬로 복사해서 편집
  const ds = notionSchedules.find(x=>String(x.id)===sid);
  if(ds){
    openSheet(null, ds.start, ds.end);
    setTimeout(()=>{ document.getElementById('inTitle').value=ds.title; }, 100);
  }
}

function assignTime(id, title){
  openSheet(null, '', '');
  setTimeout(()=>{ document.getElementById('inTitle').value=title; }, 100);
}

function deleteSched(id){
  if(!confirm('삭제할까요?'))return;
  schedules = schedules.filter(x=>String(x.id)!==String(id));
  saveLocal(); drawClock(); drawList(); showToast('삭제했어요');
}

// ════ DailySchedule 동기화 ════
function setSyncStatus(type,msg){
  const bar=document.getElementById('syncBar');
  const st=document.getElementById('syncStatus');
  bar.style.display='flex';
  st.className='sync-status '+type;
  st.textContent=msg;
}

// timeZone → 시작/종료 시간 매핑 (DailySchedule과 동일)
const TZ_MAP = {
  0: null,           // 시간미정 → 표시 안 함
  1: ['06:00','09:00'],
  2: ['09:00','12:00'],
  3: ['12:00','15:00'],
  4: ['15:00','18:00'],
  5: ['18:00','21:00'],
  6: ['21:00','24:00'],
};
const TZ_COLORS = {
  1:'#ffd166', 2:'#ff9f43', 3:'#4ecdc4',
  4:'#7c6dfa', 5:'#ff6b9d', 6:'#a29bfe',
};

function syncFromDailySchedule(){
  setSyncStatus('loading','동기화 중...');
  try{
    const raw = localStorage.getItem('dailySchedule_v4');
    if(!raw){
      const keys = Object.keys(localStorage).slice(0,5).join(', ') || '(비어있음)';
      setSyncStatus('err','데이터 없음');
      showToast('키 없음. localStorage: ' + keys);
      return;
    }
    const ds = JSON.parse(raw);
    const today = new Date().toLocaleDateString('sv-SE');
    const allItems = ds.data||[];
    const todayItems = allItems.filter(p => p.date <= today);
    showToast(`전체 ${allItems.length}개 / 오늘 ${todayItems.length}개`);

    notionSchedules = todayItems
      .filter(p => p.timeZone && p.timeZone > 0)
      .map(p => {
        const [start, end] = TZ_MAP[p.timeZone];
        return { id:'ds_'+p.id, title:p.title, start, end,
          color:TZ_COLORS[p.timeZone]||COLORS[0], memo:'', repeat:null, _src:'ds' };
      });

    dsNoTime = todayItems.filter(p => !p.timeZone || p.timeZone === 0)
      .map(p => ({ id:'ds_nt_'+p.id, title:p.title, _src:'ds_notime' }));

    const now = new Date();
    const hm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setSyncStatus('ok', `${notionSchedules.length + dsNoTime.length}개 · ${hm}`);
    drawClock(); drawList();
  } catch(err) {
    setSyncStatus('err','오류');
    showToast('오류: ' + err.message);
  }
}

// 🔄 버튼 → 수동 재동기화
document.getElementById('btnNotionSettings').addEventListener('click', syncFromDailySchedule);

// ════ 탭 ════
document.querySelectorAll('.vtab').forEach(tab=>tab.addEventListener('click',()=>{

// ════ 토스트 ════
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2400);
}

// ════ 날짜 표시 ════
(()=>{
  const d=new Date(),days=['일','월','화','수','목','금','토'];
  document.getElementById('hdate').textContent=`${d.getMonth()+1}월 ${d.getDate()}일(${days[d.getDay()]})`;

// ════ 드래그로 일정 추가 (터치 + 마우스 통합) ════
const svgEl2=document.getElementById('clockSvg');

// SVG 내부 좌표(0~400) 기준 각도 + 거리 반환
function getAngleFromEvent(e){
  const rect=svgEl2.getBoundingClientRect();
  const src=(e.touches&&e.touches.length>0)?e.touches[0]
           :(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]
           :e;
  // 화면 px → SVG 내부 400×400 좌표계로 변환
  const scaleX=400/rect.width, scaleY=400/rect.height;
  const x=(src.clientX-rect.left)*scaleX-CX;
  const y=(src.clientY-rect.top)*scaleY-CY;
  const dist=Math.sqrt(x*x+y*y);
  const angle=Math.atan2(y,x)*180/Math.PI;
  return{angle,dist};
}

// dist는 SVG 내부 좌표(0~400) 기준이므로 RI/R과 직접 비교 가능
function isRingZone(dist){return dist>=(RI-10)&&dist<=(R+20);}

function removeDragPreview(){
  if(dragState&&dragState.previewEl){
    dragState.previewEl.remove();
    dragState.previewEl=null;
  }
}

function makeDragArc(aS,aE){
  // 항상 document.createElementNS 사용 (SVG 요소에는 없음)
  const p=document.createElementNS(NS,'path');
  let sweep=aE-aS; if(sweep<=0)sweep+=360;
  p.setAttribute('d',arcOnlyPath(aS,aE));
  p.setAttribute('fill','none');
  p.setAttribute('stroke','rgba(255,255,255,0.55)');
  p.setAttribute('stroke-width','6');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-dasharray','8 5');
  // 터치에서 잘 보이도록 외곽에 글로우 효과
  p.setAttribute('filter','drop-shadow(0 0 3px rgba(255,255,255,0.6))');
  return p;
}

// 터치 이벤트
svgEl2.addEventListener('touchstart',e=>{
  const{angle,dist}=getAngleFromEvent(e);
  if(!isRingZone(dist))return;
  e.preventDefault();
  dragState={startAngle:angle,previewEl:null};
},{passive:false});

svgEl2.addEventListener('touchmove',e=>{
  if(!dragState)return;
  e.preventDefault();
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  const p=makeDragArc(dragState.startAngle,angle);
  svgEl2.appendChild(p);
  dragState.previewEl=p;

  // 현재 시간 힌트 표시
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  document.getElementById('nowTime').textContent=`${tS}~${tE}`;
},{passive:false});

svgEl2.addEventListener('touchend',e=>{
  if(!dragState)return;
  e.preventDefault();
  removeDragPreview();
  // 시각 복원
  const now=new Date();
  document.getElementById('nowTime').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const{angle}=getAngleFromEvent(e);
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  dragState=null;
  if(tS!==tE){
    openSheet(null,tS,tE);
  }else{
    showToast('조금 더 드래그해보세요');
  }
},{passive:false});

svgEl2.addEventListener('touchcancel',()=>{
  removeDragPreview();
  dragState=null;
  const now=new Date();
  document.getElementById('nowTime').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
});

// 마우스 이벤트 (데스크탑)
svgEl2.addEventListener('mousedown',e=>{
  const{angle,dist}=getAngleFromEvent(e);
  if(!isRingZone(dist))return;
  dragState={startAngle:angle,previewEl:null};
});
svgEl2.addEventListener('mousemove',e=>{
  if(!dragState)return;
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  let aS=dragState.startAngle, aE=angle;
  if(aE<aS)aE+=360;
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',arcOnlyPath(aS,aE));
  p.setAttribute('fill','none');
  p.setAttribute('stroke','rgba(255,255,255,0.4)');
  p.setAttribute('stroke-width','5');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-dasharray','7 4');
  svgEl2.appendChild(p);
  dragState.previewEl=p;
});
svgEl2.addEventListener('mouseup',e=>{
  if(!dragState)return;
  removeDragPreview();
  const{angle}=getAngleFromEvent(e);
  const tS=angleToSnap(dragState.startAngle);
  const tE=angleToSnap(angle);
  dragState=null;
  if(tS!==tE)openSheet(null,tS,tE);
});
svgEl2.addEventListener('mouseleave',()=>{removeDragPreview();dragState=null;});

// ════ 초기 실행 ════
drawClock();
setInterval(drawClock, 30000);
// 앱 열리자마자 DailySchedule 자동 동기화
setTimeout(syncFromDailySchedule, 400);
</script>
